<!doctype html><html><head><meta charset=utf-8><meta name=viewport content='width=device-width,initial-scale=1'><title>Analytics Dashboard</title><script src=https://cdn.jsdelivr.net/npm/chart.js></script><script src=https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js></script><style>body{margin:0;background:#f5f7fb;font-family:system-ui,Arial;color:#10203b}.panel{background:white;border:1px solid #dce3ee;border-radius:18px;box-shadow:0 18px 45px #10203b20}.hint{color:#66758e}.page{padding:18px;max-width:1380px;margin:auto}.panel{padding:22px}.top{display:flex;justify-content:space-between;gap:20px;border-bottom:1px solid #dce3ee;padding-bottom:16px}.top h1{margin:0;font-size:28px}.up{background:#082757;color:white;border:0;border-radius:12px;padding:12px 16px;font-weight:800;position:relative;display:inline-block;overflow:hidden}.up input{position:absolute;inset:0;opacity:0}.grid{display:grid;grid-template-columns:minmax(680px,1fr) 380px;gap:24px;margin-top:18px}.chart{height:430px}.side{border-left:1px solid #dce3ee;padding-left:22px}.tags{display:flex;gap:10px;margin:8px 0}.tag{color:white;border-radius:9px;padding:8px 10px;font-size:12px;font-weight:800}.n{background:#082757}.t{background:#0c929b}.h,.tr{display:grid;grid-template-columns:55px 1fr 58px;gap:10px;align-items:center}.h{font-size:11px;color:#66758e;font-weight:800}.tr{min-height:58px;border-bottom:1px dashed #dce3ee}.bars{display:grid;gap:7px}.br{display:flex;gap:8px;align-items:center}.bar{height:14px;border-radius:0 8px 8px 0}.q{background:#1f67cf}.c{background:#0c929b}.pct{width:50px;height:50px;border-radius:50%;border:1.5px dashed #8bb5c7;display:grid;place-items:center;color:#0c929b;font-weight:900}.tot{background:#f5f8fc;border:1px solid #dce3ee;border-radius:10px;margin-top:10px;padding:12px;display:grid;grid-template-columns:65px 1fr 1fr 55px;gap:8px;font-weight:900}.kpis{display:grid;grid-template-columns:1fr 1fr 1fr 1.4fr;border:1px solid #dce3ee;border-radius:14px;margin-top:18px;overflow:hidden}.kpi{padding:16px 20px;border-right:1px solid #dce3ee}.kpi:last-child{border:0;background:#f7f9fc}.kpi label{font-size:12px;font-weight:900;color:#1f67cf}.big{font-size:30px;font-weight:900}@media(max-width:950px){.grid{grid-template-columns:1fr}.side{border-left:0;border-top:1px solid #dce3ee;padding:18px 0 0}.kpis{grid-template-columns:1fr 1fr}.top{display:block}}@media(max-width:620px){.kpis{grid-template-columns:1fr}.chart{height:360px}.panel{padding:16px}}</style></head><body><main class=page id=app><section class=panel><div class=top><div><h1>Monthly Historical Activity</h1><p class=hint>Quoted vs Closed | Last 24 Months</p></div><div><label class=up>Import CSV<input id=file type=file accept=.csv,text/csv></label><div class=hint>Columns: month, tenor, quoted, closed.</div></div></div><div class=grid><div><h3>Monthly Volume</h3><div class=tags><div class='tag n' id=peak>Peak quoted</div><div class='tag t' id=best>Best hit rate</div></div><div class=chart><canvas id=monthly></canvas></div></div><aside class=side><h3>By Bucket</h3><div class=h><div>Bucket</div><div>Quoted / Closed</div><div>Hit</div></div><div id=tenors></div><div class=tot id=total></div></aside></div><div class=kpis><div class=kpi><label>TOTAL QUOTED</label><div class=big id=tq>-</div></div><div class=kpi><label style='color:#0c929b'>TOTAL CLOSED</label><div class=big id=tc>-</div></div><div class=kpi><label style='color:#e46b55'>HIT RATE</label><div class=big id=hr>-</div></div><div class=kpi><p id=insight>Import a CSV to rebuild the dashboard.</p></div></div></section></main><script>const T=['Spot','1M','3M','6M','12M+'],C={Spot:'#082757','1M':'#1f67cf','3M':'#0c929b','6M':'#9bd3df','12M+':'#b8c7dc'};let ch;file.onchange=e=>{let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=x=>Papa.parse(x.target.result,{header:true,dynamicTyping:true,skipEmptyLines:true,complete:p=>draw(p.data)});r.readAsText(f)};function month(x){let s=String(x||'').trim();if(!s)return null;if(s[4]=='-')return s.slice(0,7);let d=new Date(s);return isNaN(d)?s:d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')}function ten(x){let s=String(x||'').toUpperCase().replaceAll(' ','');if(s==='SPOT'||s==='SP')return'Spot';if(['1M','3M','6M'].includes(s))return s;return'12M+'}function fmt(x){return Math.round(x).toLocaleString('en-US')}function pct(c,q){return q?Math.round(c/q*100):0}function lab(x){let a=x.split('-');return new Date(+a[0],+a[1]-1,1).toLocaleString('en-US',{month:'short'})+' '+a[0].slice(2)}function draw(rows){let mp=new Map();for(let r of rows){let o={};Object.keys(r).forEach(k=>o[k.trim().toLowerCase()]=r[k]);let m=month(o.month||o.date||o.period),t=ten(o.tenor||o.bucket||o.prazo||o.maturity);if(!m)continue;if(!mp.has(m)){mp.set(m,{});T.forEach(x=>mp.get(m)[x]={q:0,c:0})}mp.get(m)[t].q+=Number(o.quoted||o.quote||o.rfq||o.quoted_volume||0);mp.get(m)[t].c+=Number(o.closed||o.done||o.traded||o.closed_volume||0)}let months=[...mp.keys()].sort().slice(-24),tot={q:0,c:0},tt={};T.forEach(t=>tt[t]={q:0,c:0});let qm=[],cm=[];for(let m of months){let q=0,c=0;for(let t of T){q+=mp.get(m)[t].q;c+=mp.get(m)[t].c;tt[t].q+=mp.get(m)[t].q;tt[t].c+=mp.get(m)[t].c}qm.push(q);cm.push(c);tot.q+=q;tot.c+=c}chart(months,mp,cm);side(tt,tot);kpis(tot,months,qm,cm)}function chart(months,mp,cm){let ds=T.map(t=>({type:'bar',label:t,data:months.map(m=>mp.get(m)[t].q),backgroundColor:C[t],stack:'q'}));ds.push({type:'line',label:'Closed',data:cm,borderColor:'#061a42',backgroundColor:'#061a42',borderWidth:3,pointRadius:4,tension:.25});if(ch)ch.destroy();ch=new Chart(monthly,{data:{labels:months.map(lab),datasets:ds},options:{maintainAspectRatio:false,plugins:{legend:{position:'top',align:'start'}},scales:{x:{stacked:true,grid:{display:false}},y:{stacked:true,beginAtZero:true}}}})}function side(tt,tot){let mx=Math.max(...T.map(t=>tt[t].q),1);tenors.innerHTML=T.map(t=>`<div class=tr><b>${t}</b><div class=bars><div class=br><div class='bar q' style='width:${Math.max(3,tt[t].q/mx*100)}%'></div><span>${fmt(tt[t].q)}</span></div><div class=br><div class='bar c' style='width:${Math.max(3,tt[t].c/mx*100)}%'></div><span>${fmt(tt[t].c)}</span></div></div><div class=pct>${pct(tt[t].c,tt[t].q)}%</div></div>`).join('');total.innerHTML=`<b>TOTAL</b><span style=color:#1f67cf>${fmt(tot.q)}</span><span style=color:#0c929b>${fmt(tot.c)}</span><div class=pct>${pct(tot.c,tot.q)}%</div>`}function kpis(tot,months,qm,cm){tq.textContent=fmt(tot.q);tc.textContent=fmt(tot.c);hr.textContent=pct(tot.c,tot.q)+'%';let p=qm.indexOf(Math.max(...qm)),b=0,br=-1;for(let i=0;i<months.length;i++){let r=qm[i]?cm[i]/qm[i]:0;if(r>br){br=r;b=i}}peak.textContent=`Peak quoted: ${lab(months[p])} | ${fmt(qm[p])}`;best.textContent=`Best hit rate: ${lab(months[b])} | ${pct(cm[b],qm[b])}%`;insight.innerHTML=`Quoted volume peaked in <b>${lab(months[p])}</b>. Highest close rate was <b>${pct(cm[b],qm[b])}%</b> in <b>${lab(months[b])}</b>.`}</script></body></html>
