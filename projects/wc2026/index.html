function buildInitialOrders() {
  const orders = []; let n = 1000; const ts = Date.now() - 7200000; const bots = ['B1','B2','B3'];

    for (let i=0;i<3;i++) {
      orders.push({id:`I${n++}`,userId:bots[i%3],teamId:team.id,side:'buy',price:Math.max(1,s.b-i),qty:10+i*5,filledQty:0,type:'live',status:'open',isDirect:false,counterpartId:null,createdAt:ts+ti*30+i});

    }
  });
  return orders;
}
function computeMarket(teams, orders) {
  const live = orders.filter(o => (o.status==='open'||o.status==='partial') && o.type==='live' && !o.isDirect);
  return teams.map(t => {
    const to = live.filter(o => o.teamId===t.id);
    const bids = to.filter(o=>o.side==='buy').map(o=>o.price);
    const asks = to.filter(o=>o.side==='sell').map(o=>o.price);
    const bestBid = bids.length ? Math.max(...bids) : null;
    const bestAsk = asks.length ? Math.min(...asks) : null;
    const mid = bestBid!=null && bestAsk!=null ? (bestBid+bestAsk)/2 : (bestBid ?? bestAsk ?? 0);
    const bVol = to.filter(o=>o.side==='buy').reduce((s,o)=>s+(o.qty-o.filledQty),0);
    const aVol = to.filter(o=>o.side==='sell').reduce((s,o)=>s+(o.qty-o.filledQty),0);
    return {...t,bestBid,bestAsk,mid,bVol,aVol};
  }).sort((a,b)=>b.mid-a.mid);
}
function computePnL(userId,trades,market,settlement){
  let cashOut=0,cashIn=0; const pos={}, cb={};
  for(const t of trades){ if(!pos[t.teamId]){pos[t.teamId]=0;cb[t.teamId]={spent:0,recv:0,bq:0,sq:0};}
    if(t.buyUserId===userId){cashOut+=t.qty*t.price;pos[t.teamId]+=t.qty;cb[t.teamId].spent+=t.qty*t.price;cb[t.teamId].bq+=t.qty;}
    if(t.sellUserId===userId){cashIn+=t.qty*t.price;pos[t.teamId]-=t.qty;cb[t.teamId].recv+=t.qty*t.price;cb[t.teamId].sq+=t.qty;}
  }
  const cash=10000-cashOut+cashIn; let totalPnl=0; const rows=[];
  for(const [tid,qty] of Object.entries(pos)){ const mkt=market.find(m=>m.id===tid); const d=cb[tid];
    const markVal=settlement.done?qty*(settlement.winnerId===tid?100:0):qty*(mkt?.mid||0);
    const netCost=d.spent-d.recv; const upl=markVal-netCost; totalPnl+=upl;
    if(d.bq>0||qty!==0) rows.push({tid,name:mkt?.name||tid,flag:mkt?.flag||'',qty,mid:mkt?.mid||0,avgBuy:d.bq?d.spent/d.bq:0,avgSell:d.sq?d.recv/d.sq:0,netCost,markVal,upl,active:mkt?.active??true});
  }
  rows.sort((a,b)=>Math.abs(b.upl)-Math.abs(a.upl)); return {cash,totalPnl,rows,cashOut,cashIn};
}

  function MarketView(){const [filter,setFilter]=useState(''); const rows=market.filter(t=>(t.active||!filter)&&(t.name.toLowerCase().includes(filter.toLowerCase())||t.id.toLowerCase().includes(filter.toLowerCase()))); return <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column',padding:8,gap:6}}><div style={{display:'flex',gap:8,alignItems:'center'}}><input style={{...ST.input,width:160,fontSize:10,padding:'4px 8px'}} placeholder='SEARCH TEAM…' value={filter} onChange={e=>setFilter(e.target.value)}/><span style={{fontSize:9,color:C.txtDim}}>{rows.length} TEAMS</span></div><div style={{flex:1,overflowY:'auto'}}><table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}><thead style={{position:'sticky',top:0,background:C.panelB,zIndex:1}}><tr>{['#','TEAM','BID','VOL','MID','ASK','VOL','ACTION'].map((h,i)=><th key={i} style={{...ST.tHead,textAlign:i>1?'right':'left'}}>{h}</th>)}</tr></thead><tbody>{rows.map((t,i)=><tr key={t.id} style={{background:i%2===0?C.bg:C.panel,opacity:t.active?1:.45}}><td style={{...ST.tCell,color:C.txtDim}}>{i+1}</td><td style={ST.tCell}><span style={{marginRight:6}}>{t.flag}</span><span style={{color:t.active?C.txtHi:C.txtDim}}>{t.name}</span>{!t.active&&<span style={{color:C.rd,fontSize:9,marginLeft:6}}>ELIM</span>}</td><td style={{...ST.tCell,textAlign:'right',color:t.bestBid!=null?C.grHi:C.txtDim,fontWeight:'bold'}}>{t.bestBid!=null?t.bestBid:'—'}</td><td style={{...ST.tCell,textAlign:'right',color:C.gr,fontSize:9}}>{t.bVol||''}</td><td style={{...ST.tCell,textAlign:'right',color:C.amHi}}>{t.mid>0?fmt(t.mid,1):'—'}</td><td style={{...ST.tCell,textAlign:'right',color:t.bestAsk!=null?C.rdHi:C.txtDim,fontWeight:'bold'}}>{t.bestAsk!=null?t.bestAsk:'—'}</td><td style={{...ST.tCell,textAlign:'right',color:C.rd,fontSize:9}}>{t.aVol||''}</td><td style={{...ST.tCell,textAlign:'center'}}>{t.active&&<div style={{display:'flex',gap:4,justifyContent:'center'}}><button style={{...ST.btn,padding:'2px 8px',fontSize:9,background:C.gr+'22',color:C.grHi,border:`1px solid ${C.gr}`}} onClick={()=>{setEntryForm(f=>({...f,team:t.id,side:'buy',price:t.bestAsk||''}));setTab('ENTRY')}}>BUY</button><button style={{...ST.btn,padding:'2px 8px',fontSize:9,background:C.rd+'22',color:C.rdHi,border:`1px solid ${C.rd}`}} onClick={()=>{setEntryForm(f=>({...f,team:t.id,side:'sell',price:t.bestBid||''}));setTab('ENTRY')}}>SELL</button></div>}</td></tr>)}</tbody></table></div><div style={{fontSize:9,color:C.txtDim,padding:'2px 4px'}}>CONTRACT VALUE: 100 · PRICES ARE PROBABILITY × 100 · INTEGER ONLY</div></div>}
  function EntryView(){const {team,side,price,qty,type,direct,cp}=entryForm; const f=v=>setEntryForm(prev=>({...prev,...v})); const mkt=market.find(m=>m.id===team); return <div style={{flex:1,overflowY:'auto',padding:12,maxWidth:520,margin:'0 auto',width:'100%',boxSizing:'border-box'}}><Panel title='NEW ORDER'><div style={{display:'flex',flexDirection:'column',gap:10}}><div style={ST.col}><div style={ST.label}>TEAM</div><select style={ST.input} value={team} onChange={e=>f({team:e.target.value})}><option value=''>— SELECT TEAM —</option>{market.filter(t=>t.active).map(t=><option key={t.id} value={t.id}>{t.flag} {t.name} | BID:{t.bestBid??'-'} ASK:{t.bestAsk??'-'}</option>)}</select></div>{mkt&&<div style={{background:C.bg,border:`1px solid ${C.border}`,padding:'6px 10px',display:'flex',gap:16,fontSize:10,alignItems:'center',flexWrap:'wrap'}}><span>{mkt.flag} <span style={{color:C.txtHi}}>{mkt.name}</span></span><span>BID <span style={{color:C.grHi,fontWeight:'bold'}}>{mkt.bestBid??'-'}</span></span><span>ASK <span style={{color:C.rdHi,fontWeight:'bold'}}>{mkt.bestAsk??'-'}</span></span><span>MID <span style={{color:C.amHi}}>{mkt.mid>0?fmt(mkt.mid,1):'-'}</span></span></div>}<div style={ST.col}><div style={ST.label}>SIDE</div><div style={{display:'flex',gap:0}}>{['buy','sell'].map(s=><button key={s} style={{...ST.btn,flex:1,background:side===s?(s==='buy'?C.gr:C.rd):C.panel,color:side===s?'#000':C.txt,border:`1px solid ${s==='buy'?C.gr:C.rd}`,fontSize:12,letterSpacing:2,padding:8}} onClick={()=>f({side:s})}>{s.toUpperCase()}</button>)}</div></div><div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}><Inp label='PRICE (1–99)' value={price} onChange={v=>f({price:v.replace(/\D/g,'')})} type='number' min={1} max={99}/><Inp label='QUANTITY' value={qty} onChange={v=>f({qty:v.replace(/\D/g,'')})} type='number' min={1}/></div>{price&&qty&&<div style={{background:C.bg,border:`1px solid ${C.border}`,padding:'6px 10px',fontSize:10,display:'flex',gap:12,flexWrap:'wrap'   function OrdersView(){const liveOrds=myOrders.filter(o=>o.type==='live'&&(o.status==='open'||o.status==='partial')&&!o.isDirect), holdOrds=myOrders.filter(o=>o.type==='hold'&&o.status==='open'&&!o.isDirect), doneOrds=myOrders.filter(o=>['filled','cancelled','rejected'].includes(o.status)); const table=(arr,actions)=><table style={{width:'100%',borderCollapse:'collapse'}}><thead><tr>{['SIDE','TEAM','PRICE','QTY','STATUS','ACTIONS'].map(h=><th key={h} style={ST.tHead}>{h}</th>)}</tr></thead><tbody>{arr.map(o=>{const tm=TEAMS_DATA.find(t=>t.id===o.teamId); return <tr key={o.id} style={{background:C.panel}}><td style={{...ST.tCell,color:sideColor(o.side)}}>{o.side.toUpperCase()}</td><td style={ST.tCell}>{tm?.flag} {tm?.name||o.teamId}</td><td style={{...ST.tCell,textAlign:'right',color:C.amHi}}>{o.price}</td><td style={{...ST.tCell,textAlign:'right'}}>{o.filledQty}/{o.qty}</td><td style={{...ST.tCell,textAlign:'center',fontSize:9,color:o.status==='filled'?C.grHi:o.status==='cancelled'?C.rd:o.status==='partial'?C.am:C.txt}}>{o.status.toUpperCase()}</td><td style={ST.tCell}>{actions(o)}</td></tr>})}</tbody></table>; return <div style={{flex:1,overflowY:'auto',padding:8,display:'flex',flexDirection:'column',gap:8}}><Panel title={`LIVE ORDERS (${liveOrds.length})`}>{liveOrds.length?table(liveOrds,o=><button style={{...ST.btn,padding:'2px 8px',fontSize:9,background:'transparent',color:C.rd,border:`1px solid ${C.rd}`}} onClick={()=>cancelOrder(o.id)}>CANCEL</button>):<div style={{color:C.txtDim,fontSize:11,textAlign:'center',padding:12}}>NO LIVE ORDERS</div>}</Panel><Panel title={`ON HOLD (${holdOrds.length})`}>{holdOrds.length?table(holdOrds,o=><><button style={{...ST.btn,padding:'2px 8px',fontSize:9,background:'transparent',color:C.gr,border:`1px solid ${C.gr}`,marginRight:4}} onClick={()=>activateHold(o.id)}>ACTIVATE</button><button style={{...ST.btn,padding:'2px 8px',fontSize:9,background:'transparent',color:C.rd,border:`1px solid ${C.rd}`}} onClick={()=>cancelOrder(o.id)}>CANCEL</button></>):<div style={{color:C.txtDim,fontSize:11,textAlign:'center',padding:12}}>NO HOLD ORDERS</div>}</Panel><Panel title={`COMPLETED / CANCELLED (${doneOrds.length})`}>{doneOrds.length?table(doneOrds.slice(-20).reverse(),o=>null):<div style={{color:C.txtDim,fontSize:11,textAlign:'center',padding:12}}>NO HISTORY</div>}</Panel></div>}
  function TradesView(){return <div style={{flex:1,overflowY:'auto',padding:8}}><Panel title={`EXECUTED TRADES (${myTrades.length})`}>{myTrades.length===0?<div style={{color:C.txtDim,textAlign:'center',padding:16,fontSize:11}}>NO TRADES YET</div>:<table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}><thead><tr>{['SIDE','TEAM','PRICE','QTY','COUNTERPART','TIME','TYPE'].map(h=><th key={h} style={ST.tHead}>{h}</th>)}</tr></thead><tbody>{[...myTrades].reverse().map((t,i)=>{const isBuy=t.buyUserId===currentUser.id, cpId=isBuy?t.sellUserId:t.buyUserId, cpUser=users.find(u=>u.id===cpId), tm=TEAMS_DATA.find(x=>x.id===t.teamId), d=new Date(t.executedAt); return <tr key={t.id} style={{background:i%2===0?C.bg:C.panel}}><td style={{...ST.tCell,color:isBuy?C.grHi:C.rdHi,fontWeight:'bold'}}>{isBuy?'BUY':'SELL'}</td><td style={ST.tCell}>{tm?.flag} {tm?.name||t.teamId}</td><td style={{...ST.tCell,textAlign:'right',color:C.amHi,fontWeight:'bold'}}>{t.price}</td><td style={{...ST.tCell,textAlign:'right'}}>{t.qty}</td><td style={{...ST.tCell,color:C.cy}}>{cpUser?.nickname||cpId}</td><td style={{...ST.tCell,fontSize:9,color:C.txtDim}}>{d.toLocaleTimeString()}</td><td style={{...ST.tCell,fontSize:9}}>{t.isDirect?<span style={{color:C.am}}>DIRECT</span>:'MARKET'}</td></tr>})}</tbody></table>}</Panel></div>}
  function MsgsView(){return <div style={{flex:1,overflowY:'auto',padding:8,display:'flex',flexDirection:'column',gap:8}}><Panel title={`RECEIVED — AWAITING APPROVAL (${recvOrders.length})`}>{recvOrders.length===0?<div style={{color:C.txtDim,textAlign:'center',padding:12,fontSize:11}}>NO PENDING ORDERS</div>:recvOrders.map(o=>{const tm=TEAMS_DATA.find(t=>t.id===o.teamId), sender=users.find(u=>u.id===o.userId), myRole=o.side==='buy'?'SELL':'BUY'; return <div key={o.id} style={{background:C.bg,border:`1px solid ${C.am}`,padding:10,marginBottom:8}}><div style={{display:'flex',justifyContent:'space-between',flexWrap:'wrap',gap:8,marginBottom:8}}><div><div style={{fontSize:9,color:C.txtDim,marginBottom:2}}>FROM</div><span style={{color:C.cy,fontSize:12}}>{sender?.nickname||o.userId}</span></div><div style={{textAlign:'right'}}><div style={{fontSize:9,color:C.txtDim}}>YOUR ROLE</div><span style={{color:myRole==='BUY'?C.grHi:C.rdHi,fontSize:12,fontWeight:'bold'}}>{myRole}</span></div></div><div style={{display:'flex',gap:16,fontSize:11,flexWrap:'wrap',marginBottom:10}}><span>{tm?.flag} <span style={{color:C.txtHi}}>{tm?.name}</span></span><span>PRICE <span style={{color:C.amHi,fontWeight:'bold'}}>{o.price}</span></span><span>QTY <span style={{color:C.txtHi}}>{o.qty}</span></span></div><div style={{display:'flex',gap:8}}><button style={{...ST.btn,background:C.gr,color:'#000',border:'none',flex:1,letterSpacing:1}} onClick={()=>acceptDirect(o.id)}>✓ ACCEPT</button><button style={{...ST.btn,background:C.rd,color:'#fff',border:'none',flex:1,letterSpacing:1}} onClick={()=>rejectDirect(o.id)}>✗ REJECT</button></div></div>})}</Panel><Panel title={`SENT — AWAITING CONFIRMATION (${sentOrders.length})`}>{sentOrders.length===0?<div style={{color:C.txtDim,textAlign:'center',padding:12,fontSize:11}}>NO PENDING SENT ORDERS</div>:<table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}><tbody>{sentOrders.map(o=><tr key={o.id}><td style={ST.tCell}>{o.side}</td><td style={ST.tCel   function RiskView(){if(!pnl)return null; const {cash,totalPnl,rows,cashOut,cashIn}=pnl; const portVal=cash+rows.reduce((s,r)=>s+r.markVal,0); return <div style={{flex:1,overflowY:'auto',padding:8,display:'flex',flexDirection:'column',gap:8}}><div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(130px,1fr))',gap:6}}>{[{label:'CASH BALANCE',val:fmt(cash,0),col:C.amHi},{label:'PORTFOLIO VALUE',val:fmt(portVal,1),col:C.txtHi},{label:'TOTAL PNL',val:(totalPnl>=0?'+':'')+fmt(totalPnl,1),col:pxColor(totalPnl)},{label:'TOTAL BOUGHT',val:fmt(cashOut,0),col:C.rd},{label:'TOTAL SOLD',val:fmt(cashIn,0),col:C.gr},{label:'OPEN POSITIONS',val:rows.filter(r=>r.qty!==0).length,col:C.bl}].map(card=><div key={card.label} style={{background:C.panelB,border:`1px solid ${C.border}`,padding:'8px 12px'}}><div style={{fontSize:8,color:C.am,letterSpacing:2,marginBottom:4}}>{card.label}</div><div style={{fontSize:18,color:card.col,fontFamily:C.font,fontWeight:'bold'}}>{card.val}</div></div>)}</div>{settlement.done&&<div style={{background:C.bg,border:`2px solid ${C.amHi}`,padding:12}}><div style={{color:C.amHi,fontSize:12,letterSpacing:2,marginBottom:8}}>🏆 FINAL SETTLEMENT — {TEAMS_DATA.find(t=>t.id===settlement.winnerId)?.flag} {TEAMS_DATA.find(t=>t.id===settlement.winnerId)?.name}</div><div style={{fontSize:14,color:pxColor(totalPnl)}}>FINAL P&L: {totalPnl>=0?'+':''}{fmt(totalPnl,1)}</div></div>}<Panel title='OPEN POSITIONS & MARK-TO-MARKET'>{rows.length===0?<div style={{color:C.txtDim,textAlign:'center',padding:16,fontSize:11}}>NO POSITIONS</div>:<table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}><thead><tr>{['TEAM','NET QTY','AVG BUY','AVG SELL','MID','MARK VALUE','UPL'].map(h=><th key={h} style={ST.tHead}>{h}</th>)}</tr></thead><tbody>{rows.map((r,i)=><tr key={r.tid} style={{background:i%2===0?C.bg:C.panel}}><td style={ST.tCell}>{r.flag} {r.name}</td><td style={{...ST.tCell,textAlign:'right',color:r.qty>0?C.grHi:r.qty<0?C.rdHi:C.txt,fontWeight:'bold'}}>{r.qty>0?'+':''}{r.qty}</td><td style={{...ST.tCell,textAlign:'right',color:C.gr}}>{r.avgBuy>0?fmt(r.avgBuy,1):'—'}</td><td style={{...ST.tCell,textAlign:'right',color:C.rd}}>{r.avgSell>0?fmt(r.avgSell,1):'—'}</td><td style={{...ST.tCell,textAlign:'right',color:C.amHi}}>{settlement.done?(settlement.winnerId===r.tid?<span style={{color:C.grHi}}>100 🏆</span>:'0'):fmt(r.mid,1)}</td><td style={{...ST.tCell,textAlign:'right'}}>{fmt(r.markVal,1)}</td><td style={{...ST.tCell,textAlign:'right',color:pxColor(r.upl),fontWeight:'bold'}}>{r.upl>=0?'+':''}{fmt(r.upl,1)}</td></tr>)}</tbody></table>}</Panel></div>}
  function AdminView(){const [confirm,setConfirm]=useState(null); return <div style={{flex:1,overflowY:'auto',padding:8,display:'flex',flexDirection:'column',gap:8}}><Panel title='⚠ ADMIN PANEL'><div style={{color:C.am,fontSize:10,marginBottom:8,letterSpacing:1}}>SETTLEMENT IS FINAL AND IRREVERSIBLE.</div></Panel>{!settlement.done?<Panel title='SETTLEMENT — DECLARE CHAMPION'><div style={{fontSize:10,color:C.txtDim,marginBottom:8}}>Select winning team. All contracts settle: WINNER = 100, others = 0.</div><div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))',gap:4}}>{teams.map(t=><button key={t.id} style={{...ST.btn,padding:'6px 8px',fontSize:10,textAlign:'left',background:confirm===t.id?C.amHi:C.bg,color:confirm===t.id?'#000':C.txtHi,border:`1px solid ${confirm===t.id?C.am:C.border}`,opacity:t.active?1:.4}} onClick={()=>setConfirm(t.id)}>{t.flag} {t.name}</button>)}</div>{confirm&&<div style={{marginTop:12,background:C.bg,border:`2px solid ${C.am}`,padding:10}}><div style={{color:C.amHi,fontSize:11,marginBottom:8}}>⚠ CONFIRM SETTLEMENT: {TEAMS_DATA.find(t=>t.id===confirm)?.flag} {TEAMS_DATA.find(t=>t.id===confirm)?.name} IS THE CHAMPION?</div><div style={{display:'flex',gap:8}}><button style={{...ST.btn,background:C.rd,color:'#fff',border:'none',flex:1}} onClick={()=>setConfirm(null)}>CANCEL</button><button style={{...ST.btn,background:C.gr,color:'#000',border:'none',flex:2,fontWeight:'bold'}} onClick={()=>{adminSettle(confirm);setConfirm(null)}}>✓ CONFIRM SETTLEMENT</button></div></div>}</Panel>:<Panel title='SETTLEMENT COMPLETE'><div style={{color:C.grHi,fontSize:14}}>🏆 {TEAMS_DATA.find(t=>t.id===settlement.winnerId)?.flag} {TEAMS_DATA.find(t=>t.id===settlement.winnerId)?.name} — CHAMPION</div></Panel>}<Panel title='TEAM MANAGEMENT — ENABLE / DISABLE'><div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))',gap:4}}>{teams.map(t=><button key={t.id} style={{...ST.btn,padding:'5px 8px',fontSize:10,textAlign:'left',background:t.active?C.gr+'33':C.rd+'22',color:t.active?C.gr:C.rd,border:`1px solid ${t.active?C.gr:C.rd}`}} onClick={()=>adminToggleTeam(t.id)}>{t.flag} {t.name} {t.active?'● ACTIVE':'○ OUT'}</button>)}</div></Panel></div>}
  function LoginView(){return <div style={{minHeight:'100vh',background:C.bg,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',fontFamily:C.font,padding:16}}><div style={{width:'100%',maxWidth:360}}><div style={{textAlign:'center',marginBottom:28}}><div style={{fontSize:32,marginBottom:6}}>⚽</div><div style={{fontSize:22,color:C.amHi,letterSpacing:6,fontWeight:'bold'}}>WC2026</div><div style={{fontSize:11,color:C.am,letterSpacing:3,marginTop:2}}>FUTURES MARKET</div><div style={{fontSize:9,color:C.txtDim,marginTop:6,letterSpacing:2}}>PREDICTION EXCHANGE · CONTRACT VALUE: 100</div></div><div style={{background:C.panel,border:`1px solid ${C.border}`,padding:20}}><div style={{fontSize:9,color:C.am,letterSpacing:2,marginBottom:16}}>▸ USER LOGIN</div><div style={{display:'flex',flexDirection:'column',gap:10}}><Inp label='NICKNAME' value={loginForm.nick} onChange={v=>setLoginForm(f=>({...f,nick:v}))} placeholder='Enter nickname...'/><Inp label='PASSWORD' value={loginForm.pwd} type='password' onChange={v=>setLoginForm(f=>({...f,pwd:v}))} placeholder='••••••••'/><button style={{...ST.btn,background:C.bl,color:C.txtHi,border:`1px solid ${C.blHi}`,width:'100%',padding:10,fontSize:12,letterSpacing:2,marginTop:4}} onClick={doLogin}>▶ LOGIN</button></div></div><div style={{textAlign:'center',marginTop:12,fontSize:10,color:C.txtDim}}>No account? <span style={{color:C.am,cursor:'pointer',textDecoration:'underline'}} onClick={()=>setPage('register')}>REGISTER</span></div><div style={{textAlign:'center',marginTop:12,fontSize:9,color:C.txtDim,border:`1px solid ${C.border}`,padding:'6px 10px'}}>DEMO ADMIN: ADMIN / admin2026</div></div><Toast toast={toast}/></div>}
  function RegisterView(){const f=v=>setRegForm(prev=>({...prev,...v})); return <div style={{minHeight:'100vh',background:C.bg,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',fontFamily:C.font,padding:16,overflowY:'auto'}}><div style={{width:'100%',maxWidth:400}}><div style={{textAlign:'center',marginBottom:20}}><div style={{fontSize:20,color:C.amHi,letterSpacing:6}}>WC2026</div><div style={{fontSize:9,color:C.am,letterSpacing:2}}>NEW ACCOUNT</div></div><div style={{background:C.panel,border:`1px solid ${C.border}`,padding:20}}><div style={{fontSize:9,color:C.am,letterSpacing:2,marginBottom:14}}>▸ CREATE ACCOUNT</div><div style={{display:'flex',flexDirection:'column',gap:10}}><Inp label='REAL NAME' value={regForm.realName} onChange={v=>f({realName:v})} placeholder='Full name'/><Inp label='EMAIL' value={regForm.email} type='email' onChange={v=>f({email:v})} placeholder='you@email.com'/><div style={{display:'grid',gridTemplateColumns:'90px 1fr',gap:6}}><div style={ST.col}><div style={ST.label}>COUNTRY CODE</div><select style={ST.input} value={regForm.cc} onChange={e=>f({cc:e.target.value})}>{CC.map(c=><option key={c} value={c}>{c}</option>)}</select></div><Inp label='PHONE NUMBER' value={regForm.phone} onChange={v=>f({phone:v.replace(/\D/g,'')})} placeholder='0000000000'/></div><Inp label='NICKNAME' value={regForm.nick} onChange={v=>f({nick:v.replace(/[^a-zA-Z0-9_]/g,'').slice(0,12)})} placeholder='YOURNAME'/><Inp label='PASSWORD' value={regForm.pwd} type='password' onChange={v=>f({pwd:v})} placeholder='••••••••'/><div style={{fontSize:9,color:C.txtDim,borderTop:`1px solid ${C.border}`,paddingTop:8,marginTop:2}}>Starting balance: <span style={{color:C.amHi}}>10,000</span> virtual credits · Contract value: <span style={{color:C.amHi}}>100</span> · Play money only</div><button style={{...ST.btn,background:C.gr,color:'#000',border:'none',width:'100%',padding:10,fontSize:12,letterSpacing:2,fontWeight:'bold'}} onClick={doRegister}>▶ CREATE ACCOUNT</button></div></div><div style={{textAlign:'center',marginTop:12,fontSize:10,color:C.txtDim}}>Already have an account? <span style={{color:C.am,cursor:'pointer',textDecoration:'underline'}} onClick={()=>setPage('login')}>LOGIN</span></div></div><Toast toast={toast}/></div>}
}
