<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>WC2026 Futures Market</title><style>
:root{--bg:#010d18;--panel:#020f1e;--panel2:#031325;--border:#0b2640;--txt:#6a96b4;--hi:#b8d8f0;--dim:#1e3e56;--green:#00d860;--red:#ff3333;--amber:#f0b800;--blue:#2080e0;--cyan:#007888}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--txt);font-family:"Courier New",monospace}button,input,select{font-family:inherit}.wrap{min-height:100vh;display:flex;flex-direction:column}.top{background:#000;border-bottom:2px solid #b07800;padding:8px 12px;display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap}.brand{color:var(--amber);font-weight:bold;letter-spacing:3px}.sub{font-size:10px;color:#b07800;letter-spacing:2px}.tabs{display:flex;overflow-x:auto;background:var(--panel2);border-bottom:1px solid var(--border)}.tab{background:transparent;color:var(--txt);border:0;border-bottom:2px solid transparent;padding:8px 14px;font-size:10px;letter-spacing:1px;cursor:pointer}.tab.on{background:var(--bg);color:var(--amber);border-bottom-color:#b07800}.content{flex:1;overflow:auto;padding:10px}.panel{background:var(--panel);border:1px solid var(--border);margin-bottom:10px}.pt{background:var(--bg);border-bottom:1px solid var(--border);padding:6px 10px;color:#b07800;font-size:10px;letter-spacing:2px}.pb{padding:10px}.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px}.box{width:100%;max-width:380px}.center{text-align:center}.title{font-size:24px;color:var(--amber);letter-spacing:6px;font-weight:bold}.label{font-size:9px;color:#b07800;letter-spacing:2px;margin-bottom:3px}.field{margin-bottom:10px}input,select{width:100%;background:var(--bg);border:1px solid #164e80;color:var(--hi);padding:8px;outline:none}.btn{border:1px solid var(--blue);background:var(--panel);color:var(--hi);padding:8px 12px;cursor:pointer;font-size:11px;letter-spacing:1px}.btn.full{width:100%}.btn.green{background:#00a845;color:#000;border:0;font-weight:bold}.btn.red{background:#c01818;color:#fff;border:0}.btn.small{padding:3px 8px;font-size:9px}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px}.card{background:var(--panel2);border:1px solid var(--border);padding:10px}.metric{font-size:18px;font-weight:bold}.foot{background:#000;border-top:1px solid var(--border);padding:4px 12px;font-size:9px;color:var(--dim);display:flex;gap:16px;flex-wrap:wrap}table{width:100%;border-collapse:collapse;font-size:11px}th{position:sticky;top:0;background:var(--panel2);font-weight:normal;color:#b07800;letter-spacing:1px;border-bottom:1px solid var(--border);padding:5px;text-align:left}td{padding:5px;border-bottom:1px solid #03182a;white-space:nowrap}tr:nth-child(even){background:#020f1e}.r{text-align:right}.c{text-align:center}.green{color:var(--green)}.red{color:var(--red)}.amber{color:var(--amber)}.cyan{color:var(--cyan)}.hi{color:var(--hi)}.dim{color:var(--dim)}.toast{position:fixed;right:14px;bottom:50px;background:var(--panel2);border:1px solid var(--amber);color:var(--amber);padding:8px 14px;font-size:11px}.side button{flex:1}.side .on.buy{background:#00a845;color:#000}.side .on.sell{background:#c01818;color:#fff}@media(max-width:650px){.hide-sm{display:none}.content{padding:6px}td,th{padding:4px;font-size:10px}.top{font-size:11px}}
</style></head><body><div id="app"></div><script>
const teams=[['ARG','Argentina','🇦🇷',16,19],['FRA','France','🇫🇷',14,17],['BRA','Brazil','🇧🇷',12,15],['ENG','England','🏴',10,13],['GER','Germany','🇩🇪',9,12],['ESP','Spain','🇪🇸',8,11],['POR','Portugal','🇵🇹',6,8],['NED','Netherlands','🇳🇱',5,7],['BEL','Belgium','🇧🇪',3,5],['ITA','Italy','🇮🇹',3,5],['CRO','Croatia','🇭🇷',2,4],['URU','Uruguay','🇺🇾',2,4],['COL','Colombia','🇨🇴',2,4],['USA','USA','🇺🇸',2,4],['MAR','Morocco','🇲🇦',2,4],['JPN','Japan','🇯🇵',1,3],['MEX','Mexico','🇲🇽',1,3],['SEN','Senegal','🇸🇳',1,3],['NGA','Nigeria','🇳🇬',1,3],['AUS','Australia','🇦🇺',1,3],['SUI','Switzerland','🇨🇭',1,3],['DEN','Denmark','🇩🇰',1,3],['TUR','Turkey','🇹🇷',1,3],['KOR','S. Korea','🇰🇷',1,3],['CAN','Canada','🇨🇦',1,3],['POL','Poland','🇵🇱',1,3],['AUT','Austria','🇦🇹',1,3],['EGY','Egypt','🇪🇬',1,2],['IRN','Iran','🇮🇷',1,2],['SAU','Saudi Arabia','🇸🇦',1,2],['CMR','Cameroon','🇨🇲',1,2],['GHA','Ghana','🇬🇭',1,2],['PAR','Paraguay','🇵🇾',1,2],['ECU','Ecuador','🇪🇨',1,2],['SRB','Serbia','🇷🇸',1,2],['HUN','Hungary','🇭🇺',1,2],['NZL','New Zealand','🇳🇿',1,2],['UZB','Uzbekistan','🇺🇿',1,2]].map(x=>({id:x[0],name:x[1],flag:x[2],bid:x[3],ask:x[4],active:true}));
let state={page:'login',tab:'MARKET',user:null,users:[{nick:'ADMIN',pwd:'admin2026',admin:true},{nick:'MM_ALPHA',pwd:'bot'},{nick:'MM_BETA',pwd:'bot'}],orders:[],trades:[],cash:10000,msg:'',side:'buy'};let oid=1,tid=1;teams.forEach(t=>{state.orders.push({id:oid++,team:t.id,side:'buy',price:t.bid,qty:20,user:'MM_ALPHA',status:'open'});state.orders.push({id:oid++,team:t.id,side:'sell',price:t.ask,qty:20,user:'MM_BETA',status:'open'});});
function $(id){return document.getElementById(id)}function toast(m){state.msg=m;render();setTimeout(()=>{state.msg='';render()},2200)}function mkt(){return teams.map(t=>{let os=state.orders.filter(o=>o.team===t.id&&o.status==='open'),b=os.filter(o=>o.side==='buy').map(o=>o.price),a=os.filter(o=>o.side==='sell').map(o=>o.price),bid=b.length?Math.max(...b):null,ask=a.length?Math.min(...a):null;return{...t,bid,ask,mid:bid&&ask?(bid+ask)/2:(bid||ask||0),bvol:os.filter(o=>o.side==='buy').reduce((s,o)=>s+o.qty,0),avol:os.filter(o=>o.side==='sell').reduce((s,o)=>s+o.qty,0)}}).sort((a,b)=>b.mid-a.mid)}function fmt(n,d=0){return Number(n||0).toFixed(d)}function pnl(){let p=0,cash=10000,pos={};state.trades.forEach(t=>{if(t.buy===state.user.nick){cash-=t.price*t.qty;pos[t.team]=(pos[t.team]||0)+t.qty}if(t.sell===state.user.nick){cash+=t.price*t.qty;pos[t.team]=(pos[t.team]||0)-t.qty}});let rows=[];mkt().forEach(x=>{let q=pos[x.id]||0;if(q){let val=q*x.mid;rows.push({...x,qty:q,val});p+=val}});return{cash,pnl:p+cash-10000,rows}}
function login(){let n=$('nick').value.trim().toUpperCase(),p=$('pwd').value;let u=state.users.find(x=>x.nick===n&&x.pwd===p);if(!u)return toast('Invalid credentials');state.user=u;state.page='app';render()}function reg(){let n=$('rn').value.trim().toUpperCase(),p=$('rp').value;if(n.length<3||!p)return toast('Nickname and password required');state.users.push({nick:n,pwd:p});state.user=state.users[state.users.length-1];state.page='app';render()}
function submit(){let team=$('team').value,side=state.side,price=parseInt($('price').value),qty=parseInt($('qty').value);if(!team||!price||!qty)return toast('Complete team, price and quantity');let book=state.orders.filter(o=>o.team===team&&o.side!==side&&o.status==='open'&&(side==='buy'?o.price<=price:o.price>=price)).sort((a,b)=>side==='buy'?a.price-b.price:b.price-a.price);let rem=qty;book.forEach(o=>{if(rem<=0)return;let q=Math.min(rem,o.qty);rem-=q;o.qty-=q;if(o.qty===0)o.status='filled';state.trades.push({id:tid++,team,price:o.price,qty:q,buy:side==='buy'?state.user.nick:o.user,sell:side==='sell'?state.user.nick:o.user,time:new Date().toLocaleTimeString()})});if(rem>0)state.orders.push({id:oid++,team,side,price,qty:rem,user:state.user.nick,status:'open'});toast(rem<qty?'Order executed':'Order added to book');render()}
function setTab(t){state.tab=t;render()}function setSide(s){state.side=s;render()}function renderLogin(){app.innerHTML=`<div class="login"><div class="box center"><div style="font-size:34px">⚽</div><div class="title">WC2026</div><div class="sub">FUTURES MARKET</div><div class="panel" style="margin-top:24px;text-align:left"><div class="pt">USER LOGIN</div><div class="pb"><div class="field"><div class="label">NICKNAME</div><input id="nick" value="ADMIN"></div><div class="field"><div class="label">PASSWORD</div><input id="pwd" type="password" value="admin2026"></div><button class="btn full" onclick="login()">LOGIN</button></div></div><div class="panel" style="text-align:left"><div class="pt">CREATE ACCOUNT</div><div class="pb"><div class="field"><div class="label">NICKNAME</div><input id="rn"></div><div class="field"><div class="label">PASSWORD</div><input id="rp" type="password"></div><button class="btn green full" onclick="reg()">CREATE ACCOUNT</button></div></div><div class="dim" style="font-size:10px">Demo admin: ADMIN / admin2026</div></div></div>`}
function renderMarket(){let rows=mkt().map((t,i)=>`<tr><td>${i+1}</td><td>${t.flag} <span class="hi">${t.name}</span></td><td class="r green">${t.bid??'—'}</td><td class="r green">${t.bvol}</td><td class="r amber">${fmt(t.mid,1)}</td><td class="r red">${t.ask??'—'}</td><td class="r red">${t.avol}</td><td class="c"><button class="btn small" onclick="goEntry('${t.id}','buy',${t.ask||''})">BUY</button> <button class="btn small" onclick="goEntry('${t.id}','sell',${t.bid||''})">SELL</button></td></tr>`).join('');return `<div class="panel"><div class="pt">MARKET</div><div class="pb"><table><thead><tr><th>#</th><th>TEAM</th><th class="r">BID</th><th class="r">VOL</th><th class="r">MID</th><th class="r">ASK</th><th class="r">VOL</th><th class="c">ACTION</th></tr></thead><tbody>${rows}</tbody></table></div></div>`}
function goEntry(team,side,price){state.tab='ENTRY';state.side=side;render();$('team').value=team;$('price').value=price||''}
function renderEntry(){let opts=mkt().map(t=>`<option value="${t.id}">${t.flag} ${t.name} | BID ${t.bid??'-'} ASK ${t.ask??'-'}</option>`).join('');return `<div class="panel"><div class="pt">NEW ORDER</div><div class="pb"><div class="field"><div class="label">TEAM</div><select id="team"><option value="">Select team</option>${opts}</select></div><div class="field side"><div class="label">SIDE</div><div class="row"><button class="btn ${state.side==='buy'?'on buy':''}" onclick="setSide('buy')">BUY</button><button class="btn ${state.side==='sell'?'on sell':''}" onclick="setSide('sell')">SELL</button></div></div><div class="grid"><div class="field"><div class="label">PRICE 1-99</div><input id="price" inputmode="numeric"></div><div class="field"><div class="label">QUANTITY</div><input id="qty" inputmode="numeric"></div></div><button class="btn green full" onclick="submit()">SUBMIT ORDER</button></div></div>`}
function renderOrders(){let rows=state.orders.filter(o=>o.user===state.user.nick).map(o=>`<tr><td>${o.id}</td><td class="${o.side==='buy'?'green':'red'}">${o.side.toUpperCase()}</td><td>${o.team}</td><td class="r amber">${o.price}</td><td class="r">${o.qty}</td><td>${o.status}</td></tr>`).join('');return `<div class="panel"><div class="pt">MY ORDERS</div><div class="pb"><table><thead><tr><th>ID</th><th>SIDE</th><th>TEAM</th><th class="r">PRICE</th><th class="r">QTY</th><th>STATUS</th></tr></thead><tbody>${rows||'<tr><td colspan=6 class="c dim">No orders</td></tr>'}</tbody></table></div></div>`}
function renderTrades(){let rows=state.trades.filter(t=>t.buy===state.user.nick||t.sell===state.user.nick).reverse().map(t=>`<tr><td class="${t.buy===state.user.nick?'green':'red'}">${t.buy===state.user.nick?'BUY':'SELL'}</td><td>${t.team}</td><td class="r amber">${t.price}</td><td class="r">${t.qty}</td><td>${t.buy===state.user.nick?t.sell:t.buy}</td><td>${t.time}</td></tr>`).join('');return `<div class="panel"><div class="pt">TRADES</div><div class="pb"><table><thead><tr><th>SIDE</th><th>TEAM</th><th class="r">PRICE</th><th class="r">QTY</th><th>COUNTERPART</th><th>TIME</th></tr></thead><tbody>${rows||'<tr><td colspan=6 class="c dim">No trades</td></tr>'}</tbody></table></div></div>`}
function renderRisk(){let x=pnl();let cards=`<div class="grid"><div class="card"><div class="label">CASH</div><div class="metric amber">${fmt(x.cash)}</div></div><div class="card"><div class="label">PNL</div><div class="metric ${x.pnl>=0?'green':'red'}">${x.pnl>=0?'+':''}${fmt(x.pnl,1)}</div></div><div class="card"><div class="label">POSITIONS</div><div class="metric hi">${x.rows.length}</div></div></div>`;let rows=x.rows.map(r=>`<tr><td>${r.flag} ${r.name}</td><td class="r ${r.qty>0?'green':'red'}">${r.qty}</td><td class="r amber">${fmt(r.mid,1)}</td><td class="r">${fmt(r.val,1)}</td></tr>`).join('');return `${cards}<div class="panel"><div class="pt">POSITIONS</div><div class="pb"><table><thead><tr><th>TEAM</th><th class="r">QTY</th><th class="r">MID</th><th class="r">VALUE</th></tr></thead><tbody>${rows||'<tr><td colspan=4 class="c dim">No positions</td></tr>'}</tbody></table></div></div>`}
function renderAdmin(){return `<div class="panel"><div class="pt">ADMIN</div><div class="pb"><div class="dim">User list and settlement controls can be added here. Core market is active.</div></div></div>`}
function renderApp(){let x=pnl(),tabs=['MARKET','ENTRY','ORDERS','TRADES','RISK'].concat(state.user.admin?['ADMIN']:[]);let body=state.tab==='MARKET'?renderMarket():state.tab==='ENTRY'?renderEntry():state.tab==='ORDERS'?renderOrders():state.tab==='TRADES'?renderTrades():state.tab==='RISK'?renderRisk():renderAdmin();app.innerHTML=`<div class="wrap"><div class="top"><div><span class="brand">⚽ WC2026</span> <span class="sub">FUTURES MARKET</span></div><div class="row"><span>CASH <b class="amber">${fmt(x.cash)}</b></span><span>PNL <b class="${x.pnl>=0?'green':'red'}">${x.pnl>=0?'+':''}${fmt(x.pnl,1)}</b></span><span class="cyan">${state.user.nick}</span><button class="btn small red" onclick="state.page='login';state.user=null;render()">EXIT</button></div></div><div class="tabs">${tabs.map(t=>`<button class="tab ${state.tab===t?'on':''}" onclick="setTab('${t}')">${t}</button>`).join('')}</div><div class="content">${body}</div><div class="foot"><span>LIVE ORDERS: ${state.orders.filter(o=>o.status==='open').length}</span><span>TRADES: ${state.trades.length}</span><span class="green">● LIVE</span></div>${state.msg?`<div class="toast">${state.msg}</div>`:''}</div>`}
function render(){state.page==='login'?renderLogin():renderApp()}render();
</script></body></html>
