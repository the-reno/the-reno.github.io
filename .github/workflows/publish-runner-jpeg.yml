name: Publish runner JPEG

on:
  push:
    paths:
      - '.github/workflows/publish-runner-jpeg.yml'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decode and verify runner image
        run: |
          base64 --decode docs/assets/runner-card.jpg.b64 > docs/assets/runner-card.jpg
          echo '633c41e992239fe45803422935b13f8031e76306814b9856d57654b150608375  docs/assets/runner-card.jpg' | sha256sum --check --strict
          python - <<'PY'
          from pathlib import Path
          data = Path('docs/assets/runner-card.jpg').read_bytes()
          if data[:2] != b'\xff\xd8' or data[-2:] != b'\xff\xd9':
              raise SystemExit('Runner file is not a complete JPEG')
          i = 2
          width = height = None
          while i < len(data) - 9:
              if data[i] != 0xFF:
                  i += 1
                  continue
              marker = data[i + 1]
              i += 2
              if marker in (0xD8, 0xD9) or 0xD0 <= marker <= 0xD7:
                  continue
              size = int.from_bytes(data[i:i+2], 'big')
              if marker in (0xC0, 0xC1, 0xC2):
                  height = int.from_bytes(data[i+3:i+5], 'big')
                  width = int.from_bytes(data[i+5:i+7], 'big')
                  break
              i += size
          if (width, height) != (292, 122):
              raise SystemExit(f'Unexpected JPEG size: {(width, height)}')
          print('Verified JPEG:', width, height, len(data), 'bytes')
          PY

      - name: Point homepage to the verified JPEG
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('docs/index.html')
          html = p.read_text(encoding='utf-8')
          old = '<img class="runner" src="/assets/runner-card.webp?v=20260721b" width="584" height="244" loading="eager" decoding="async" fetchpriority="low" alt="Night runner moving beside the waterfront">'
          new = '<img class="runner" src="/assets/runner-card.jpg?v=20260722c" width="292" height="122" loading="eager" decoding="async" fetchpriority="low" alt="Night runner moving beside the waterfront">'
          if old not in html:
              raise SystemExit('Expected runner tag not found')
          html = html.replace(old, new)
          html = html.replace('.maker-artifact .runner{object-position:center center;animation:runnerFade 8.4s ease-in-out infinite}', '.maker-artifact .runner{object-position:center center;transform:translateZ(0);animation:runnerFade 8.4s ease-in-out infinite}')
          p.write_text(html, encoding='utf-8')
          PY

      - name: Remove obsolete files and publish
        run: |
          rm -f docs/assets/runner-card.webp docs/assets/runner-card.jpg.b64
          rm -f .github/workflows/publish-runner-jpeg.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/assets/runner-card.jpg
          git add -u docs/assets .github/workflows/publish-runner-jpeg.yml
          git commit -m "Publish verified runner JPEG for Maker sequence"
          git push
