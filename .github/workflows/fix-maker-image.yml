name: Optimize homepage assets

on:
  push:
    paths:
      - '.github/workflows/fix-maker-image.yml'

permissions:
  contents: write

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build standalone WebP assets and optimize homepage
        run: |
          python -m pip install --quiet pillow
          python - <<'PYCODE'
          from pathlib import Path
          from io import BytesIO
          from PIL import Image, ImageOps
          import base64
          import re

          assets = Path('docs/assets')
          target = (1168, 488)
          resample = Image.Resampling.LANCZOS

          def extract_embedded_image(path):
              source = path.read_text(encoding='utf-8')
              match = re.search(r'data:image/(?:webp|jpeg|jpg|png);base64,([^\"]+)', source)
              if not match:
                  raise SystemExit(f'Embedded image not found in {path}')
              return Image.open(BytesIO(base64.b64decode(match.group(1)))).convert('RGB')

          def write_webp(image, path, centering):
              fitted = ImageOps.fit(image, target, method=resample, centering=centering)
              fitted.save(path, 'WEBP', quality=85, method=6)

          # Convert both SVG/base64 wrappers into normal binary images.
          write_webp(extract_embedded_image(assets / 'young-memory.svg'), assets / 'young-memory.webp', (0.50, 0.54))
          write_webp(extract_embedded_image(assets / 'runner-card.svg'), assets / 'runner-card.webp', (0.50, 0.50))

          # Preserve the existing Manhattan framing in the exact Maker-card ratio.
          present = Image.open(assets / 'present-reflection.webp').convert('RGB')
          write_webp(present, assets / 'present-reflection.webp', (0.68, 0.54))

          index = Path('docs/index.html')
          html = index.read_text(encoding='utf-8')

          optimized_css = (
              '.maker-artifact{position:absolute;right:24px;bottom:24px;width:292px;height:122px;border:0;border-radius:5px;background:#0d0d0d;overflow:hidden;box-shadow:none;contain:layout paint;isolation:isolate}'
              '.maker-artifact:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.04),rgba(0,0,0,.18));pointer-events:none}'
              '.maker-artifact img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;filter:none;transform:translateZ(0) scale(1.01);backface-visibility:hidden;opacity:0;will-change:opacity}'
              '.maker-artifact .young{animation:youngFade 8.4s ease-in-out infinite}'
              '.maker-artifact .present{animation:presentFade 8.4s ease-in-out infinite}'
              '.maker-artifact .runner{animation:runnerFade 8.4s ease-in-out infinite}'
              '@keyframes youngFade{0%,25%{opacity:.94}31%,95%{opacity:0}100%{opacity:.94}}'
              '@keyframes presentFade{0%,27%{opacity:0}34%,58%{opacity:.94}65%,100%{opacity:0}}'
              '@keyframes runnerFade{0%,60%{opacity:0}67%,90%{opacity:.94}97%,100%{opacity:0}}'
              '@media(prefers-reduced-motion:reduce){.maker-artifact .young,.maker-artifact .present{animation:none;opacity:0}.maker-artifact .runner{animation:none;opacity:.94}}'
          )
          html, css_count = re.subn(r'\.maker-artifact\{.*?(?=\.arrow\{)', optimized_css, html, flags=re.S)
          if css_count != 1:
              raise SystemExit(f'Expected one Maker CSS block, found {css_count}')

          tags = {
              'young': '<img class="young" src="/assets/young-memory.webp?v=20260721" width="1168" height="488" loading="eager" decoding="async" fetchpriority="low" alt="Earlier memory watching a football game">',
              'present': '<img class="present" src="/assets/present-reflection.webp?v=20260721" width="1168" height="488" loading="eager" decoding="async" fetchpriority="low" alt="Present reflective night view toward Manhattan">',
              'runner': '<img class="runner" src="/assets/runner-card.webp?v=20260721" width="1168" height="488" loading="eager" decoding="async" fetchpriority="low" alt="Night runner moving beside the waterfront">',
          }
          for class_name, tag in tags.items():
              html, count = re.subn(fr'<img class="{class_name}"[^>]*>', tag, html)
              if count != 1:
                  raise SystemExit(f'Expected one {class_name} image, found {count}')

          # Same geometry and motion, with less repeated rendering work.
          html = html.replace(
              '.card{position:absolute;width:340px;height:318px;',
              '.card{position:absolute;width:340px;height:318px;contain:layout paint;will-change:transform,opacity,filter;'
          )
          html = html.replace(
              'translateX(${pos.x}px) translateZ(${pos.z}px)',
              'translate3d(${pos.x}px,0,${pos.z}px)'
          )
          index.write_text(html, encoding='utf-8')

          for obsolete in (assets / 'young-memory.svg', assets / 'runner-card.svg'):
              if obsolete.exists():
                  obsolete.unlink()

          # One-time migration: remove this workflow after a successful build.
          workflow = Path('.github/workflows/fix-maker-image.yml')
          if workflow.exists():
              workflow.unlink()
          PYCODE

      - name: Verify output before publishing
        run: |
          python - <<'PYCODE'
          from pathlib import Path
          from PIL import Image

          names = ('young-memory.webp', 'present-reflection.webp', 'runner-card.webp')
          for name in names:
              path = Path('docs/assets') / name
              if not path.exists():
                  raise SystemExit(f'Missing {path}')
              with Image.open(path) as image:
                  if image.format != 'WEBP' or image.size != (1168, 488):
                      raise SystemExit(f'Invalid {name}: {image.format} {image.size}')

          html = Path('docs/index.html').read_text(encoding='utf-8')
          for name in names:
              if f'/assets/{name}?v=20260721' not in html:
                  raise SystemExit(f'Homepage does not reference {name}')
          if 'runner-card.svg' in html or 'young-memory.svg' in html:
              raise SystemExit('Homepage still references an SVG wrapper')
          if 'object-fit:cover;object-position:center' not in html:
              raise SystemExit('Image fitting CSS was not updated')
          print('Homepage assets verified')
          PYCODE

      - name: Commit optimized homepage
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/assets/young-memory.webp docs/assets/present-reflection.webp docs/assets/runner-card.webp
          git add -u docs/assets .github/workflows/fix-maker-image.yml
          git commit -m "Optimize homepage assets without changing visual design"
          git push
