<!DOCTYPE html><html><head><meta charset='utf-8'><title>Deposit Engine</title><style>body{font-family:Arial;margin:20px}table{border-collapse:collapse;width:100%}td,th{border:1px solid #ccc;padding:6px}input{width:100px}</style></head><body><h2>Deposit Engine Prototype</h2><h3>Inputs</h3><p>Start Date <input id='start' type='date' value='2026-01-01'> End Date <input id='end' type='date' value='2026-12-31'></p><p>Initial Cash <input id='cash' value='500'> Min ON <input id='minon' value='100'></p><h3>Strategy (%)</h3><table><tr><th>ON</th><th>1M</th><th>2M</th><th>3M</th><th>6M</th></tr><tr><td><input id='on' value='25'></td><td><input id='m1' value='25'></td><td><input id='m2' value='25'></td><td><input id='m3' value='25'></td><td><input id='m6' value='0'></td></tr></table><br><button onclick='gen()'>Generate Test Cashflows</button><h3>Output</h3><table id='out'><tr><th>SCENARIO</th><th>STRATEGY</th><th>START_DATE</th><th>MATURITY_DATE</th><th>BUCKET</th><th>OPENING_BAL</th><th>RATE</th><th>DAYS</th><th>INTEREST_CF</th><th>PRINCIPAL_CF</th><th>FV</th></tr></table><script>function add(r){document.getElementById('out').insertAdjacentHTML('beforeend',r)} function gen(){let t=document.getElementById('out');t.innerHTML='<tr><th>SCENARIO</th><th>STRATEGY</th><th>START_DATE</th><th>MATURITY_DATE</th><th>BUCKET</th><th>OPENING_BAL</th><th>RATE</th><th>DAYS</th><th>INTEREST_CF</th><th>PRINCIPAL_CF</th><th>FV</th></tr>'; add('<tr><td>BASE</td><td>BALANCED</td><td>2026-01-01</td><td>2026-02-02</td><td>1M</td><td>100</td><td>4.25%</td><td>32</td><td>0.378</td><td>100</td><td>100.378</td></tr>'); add('<tr><td>BASE</td><td>BALANCED</td><td>2026-01-01</td><td>2026-03-02</td><td>2M</td><td>100</td><td>4.18%</td><td>60</td><td>0.697</td><td>100</td><td>100.697</td></tr>'); add('<tr><td>BASE</td><td>BALANCED</td><td>2026-01-01</td><td>2026-04-01</td><td>3M</td><td>100</td><td>4.10%</td><td>90</td><td>1.025</td><td>100</td><td>101.025</td></tr>');}</script></body></html>
