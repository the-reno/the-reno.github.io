<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Garage Structural 3D Viewer (21' x 20')</title>
  <style>
    html, body { height:100%; margin:0; background:#0b0c10; color:#e8e8e8; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; }
    #app { height:100%; width:100%; position:relative; overflow:hidden; }
    canvas { display:block; }
    .hud {
      position:absolute; left:12px; top:12px; z-index:10;
      background:rgba(0,0,0,.55); border:1px solid rgba(255,255,255,.12);
      border-radius:10px; padding:10px 12px; max-width: 360px;
      backdrop-filter: blur(6px);
    }
    .hud h1 { font-size:14px; margin:0 0 8px; font-weight:600; }
    .row { display:flex; gap:10px; align-items:center; margin:6px 0; }
    .row label { font-size:12px; opacity:.9; min-width:120px; }
    .row input[type="range"] { width: 180px; }
    .row .val { font-variant-numeric: tabular-nums; font-size:12px; opacity:.9; width:60px; text-align:right; }
    .btns { display:flex; gap:8px; margin-top:8px; flex-wrap:wrap; }
    button {
      background:#151823; color:#e8e8e8; border:1px solid rgba(255,255,255,.12);
      padding:7px 10px; border-radius:9px; cursor:pointer; font-size:12px;
    }
    button:hover { border-color: rgba(255,255,255,.25); }
    .hint { margin-top:8px; font-size:12px; opacity:.8; line-height:1.35; }
    .badge { display:inline-block; padding:2px 6px; border:1px solid rgba(255,255,255,.18); border-radius:999px; font-size:11px; opacity:.9; }
  </style>
</head>

<body>
<div id="app">
  <div class="hud">
    <h1>Garage Structural 3D Viewer <span class="badge">orbit / zoom / pan</span></h1>

    <div class="row">
      <label>Wall height (ft)</label>
      <input id="wallH" type="range" min="7" max="10" step="0.1" value="8.0" />
      <div class="val" id="wallHVal">8.0</div>
    </div>

    <div class="row">
      <label>Roof pitch (rise/12)</label>
      <input id="pitch" type="range" min="4" max="12" step="0.5" value="8" />
      <div class="val" id="pitchVal">8.0</div>
    </div>

    <div class="row">
      <label>Stud spacing (in)</label>
      <input id="stud" type="range" min="16" max="24" step="2" value="16" />
      <div class="val" id="studVal">16</div>
    </div>

    <div class="btns">
      <button id="toggleFrame">Toggle framing</button>
      <button id="toggleDims">Toggle dimensions</button>
      <button id="resetView">Reset view</button>
    </div>

    <div class="hint">
      Mouse: <b>Left</b> rotate · <b>Wheel</b> zoom · <b>Right</b> pan<br/>
      Touch: <b>1 finger</b> rotate · <b>2 fingers</b> pan/zoom
    </div>
  </div>
</div>

<!-- Three.js (module) -->
<script type="module">
  import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
  import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';

  // -----------------------------
  // Parameters (structural-only)
  // -----------------------------
  const FT = 0.3048;

  const params = {
    W_ft: 21.0,          // interior width (left-right)
    D_ft: 20.0,          // interior depth (front-rear)
    slabTh_in: 4.0,      // slab thickness
    wallH_ft: 8.0,       // default
    pitch_rise_per12: 8, // default
    studSpacing_in: 16,  // default
    doorW_ft: 6.0,       // each opening
    doorH_ft: 7.0,       // each opening
    gap_ft: 0.5,         // center post zone (placeholder; adjust if measured)
    sideReturn_ft: null, // computed
    showFraming: true,
    showDims: true
  };

  // Derived
  function computeDerived() {
    const W = params.W_ft;
    const dw = params.doorW_ft;
    const gp = params.gap_ft;
    const remaining = W - (dw + gp + dw);
    const side = Math.max(0.25, remaining / 2); // keep sensible min
    params.sideReturn_ft = side;
  }
  computeDerived();

  // -----------------------------
  // Scene setup
  // -----------------------------
  const app = document.getElementById('app');
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(2, window.devicePixelRatio));
  renderer.setSize(app.clientWidth, app.clientHeight);
  renderer.shadowMap.enabled = true;
  app.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0b0c10);

  const camera = new THREE.PerspectiveCamera(55, app.clientWidth / app.clientHeight, 0.01, 200);
  camera.position.set(6.5, -9.5, 5.5);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.target.set((params.W_ft*FT)/2, (params.D_ft*FT)/2, 1.2);
  controls.enableDamping = true;
  controls.dampingFactor = 0.06;
  controls.screenSpacePanning = true;
  controls.minDistance = 2.0;
  controls.maxDistance = 60.0;
  controls.maxPolarAngle = Math.PI * 0.49;

  // Lights
  const hemi = new THREE.HemisphereLight(0xffffff, 0x202533, 0.85);
  scene.add(hemi);

  const dir = new THREE.DirectionalLight(0xffffff, 0.85);
  dir.position.set(10, -10, 12);
  dir.castShadow = true;
  dir.shadow.mapSize.width = 2048;
  dir.shadow.mapSize.height = 2048;
  scene.add(dir);

  // Ground helper
  const grid = new THREE.GridHelper(30, 30, 0x2d3447, 0x171b26);
  grid.rotation.x = Math.PI/2; // put grid on Z=0 plane? (Three grid is XZ by default)
  // Better: keep grid as XZ, but our floor uses XY. We'll create our own axes helper.
  scene.add(new THREE.AxesHelper(2));

  // -----------------------------
  // Materials
  // -----------------------------
  const matSlab = new THREE.MeshStandardMaterial({ color: 0x9aa3ad, roughness: 0.95, metalness: 0.0 });
  const matWall = new THREE.MeshStandardMaterial({ color: 0x2a2f3a, roughness: 0.9, metalness: 0.0, transparent:true, opacity:0.35 });
  const matWood = new THREE.MeshStandardMaterial({ color: 0x5b3a21, roughness: 0.85, metalness: 0.0 });
  const matBeam = new THREE.MeshStandardMaterial({ color: 0x3a2516, roughness: 0.85, metalness: 0.0 });
  const matDim = new THREE.LineBasicMaterial({ color: 0xffffff });

  // -----------------------------
  // Helpers: build structural model
  // -----------------------------
  const root = new THREE.Group();
  scene.add(root);

  const groups = {
    envelope: new THREE.Group(),
    framing: new THREE.Group(),
    dims: new THREE.Group()
  };
  root.add(groups.envelope, groups.framing, groups.dims);

  function clearGroup(g) {
    while (g.children.length) g.remove(g.children[0]);
  }

  function box(w, d, h, material) {
    const geo = new THREE.BoxGeometry(w, d, h);
    const mesh = new THREE.Mesh(geo, material);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    return mesh;
  }

  function addDimLine(a, b, labelText) {
    const geom = new THREE.BufferGeometry().setFromPoints([a, b]);
    const line = new THREE.Line(geom, matDim);
    groups.dims.add(line);

    // simple label using canvas sprite
    const mid = new THREE.Vector3().addVectors(a, b).multiplyScalar(0.5);
    const sprite = makeLabel(labelText);
    sprite.position.copy(mid);
    groups.dims.add(sprite);
  }

  function makeLabel(text) {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    const pad = 10;
    ctx.font = 'bold 24px system-ui, -apple-system, Segoe UI, Roboto, Arial';
    const w = Math.ceil(ctx.measureText(text).width) + pad*2;
    const h = 42;
    canvas.width = w;
    canvas.height = h;
    ctx.font = 'bold 24px system-ui, -apple-system, Segoe UI, Roboto, Arial';
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(0, 0, w, h);
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.strokeRect(0.5, 0.5, w-1, h-1);
    ctx.fillStyle = 'white';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, pad, h/2);

    const tex = new THREE.CanvasTexture(canvas);
    tex.minFilter = THREE.LinearFilter;
    const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
    const spr = new THREE.Sprite(mat);
    spr.scale.set(w/200, h/200, 1);
    return spr;
  }

  function buildModel() {
    clearGroup(groups.envelope);
    clearGroup(groups.framing);
    clearGroup(groups.dims);

    computeDerived();

    const W = params.W_ft * FT;
    const D = params.D_ft * FT;
    const slabTh = (params.slabTh_in / 12) * FT;
    const He = params.wallH_ft * FT;
    const pitch = params.pitch_rise_per12; // rise per 12 run
    const halfSpan = W / 2;
    const rise = (pitch/12) * halfSpan;
    const Hr = He + rise;

    // Slab
    const slab = box(W, D, slabTh, matSlab);
    slab.position.set(W/2, D/2, -slabTh/2);
    groups.envelope.add(slab);

    // Transparent envelope walls (for context)
    const wallTh = 0.089; // 2x4 depth
    const frontWall = box(W, wallTh, He, matWall);
    frontWall.position.set(W/2, wallTh/2, He/2);
    groups.envelope.add(frontWall);

    const rearWall = box(W, wallTh, He, matWall);
    rearWall.position.set(W/2, D - wallTh/2, He/2);
    groups.envelope.add(rearWall);

    const leftWall = box(wallTh, D, He, matWall);
    leftWall.position.set(wallTh/2, D/2, He/2);
    groups.envelope.add(leftWall);

    const rightWall = box(wallTh, D, He, matWall);
    rightWall.position.set(W - wallTh/2, D/2, He/2);
    groups.envelope.add(rightWall);

    // Roof planes (simple)
    const roofTh = 0.04;
    const roofLen = D + 0.2;
    const slopeLen = Math.sqrt(halfSpan*halfSpan + rise*rise);

    // Left roof
    {
      const geo = new THREE.BoxGeometry(slopeLen, roofLen, roofTh);
      const m = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color: 0x1a1c24, roughness: 0.95 }));
      m.castShadow = true; m.receiveShadow = true;
      // rotate around Y axis to match slope in XZ plane
      const angle = Math.atan2(rise, halfSpan);
      m.rotation.y = 0;
      m.rotation.x = 0;
      m.rotation.z = angle;
      // position: center at left half
      const xCenter = W/2 - halfSpan/2;
      const zCenter = He + rise/2;
      m.position.set(xCenter, D/2, zCenter);
      groups.envelope.add(m);
    }
    // Right roof
    {
      const geo = new THREE.BoxGeometry(slopeLen, roofLen, roofTh);
      const m = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color: 0x1a1c24, roughness: 0.95 }));
      m.castShadow = true; m.receiveShadow = true;
      const angle = -Math.atan2(rise, halfSpan);
      m.rotation.z = angle;
      const xCenter = W/2 + halfSpan/2;
      const zCenter = He + rise/2;
      m.position.set(xCenter, D/2, zCenter);
      groups.envelope.add(m);
    }

    // Framing: plates + studs + headers + rafters + center post
    const studSpacing = (params.studSpacing_in / 12) * FT;
    const studW = 0.038;
    const studD = 0.089;

    function addStud(x, y, z0, h, rotZ=0) {
      const s = box(studW, studD, h, matWood);
      s.rotation.z = rotZ;
      s.position.set(x, y, z0 + h/2);
      groups.framing.add(s);
    }

    // Plates (simplified)
    const plateH = 0.038;
    const bottomPlateFront = box(W, studD, plateH, matBeam);
    bottomPlateFront.position.set(W/2, studD/2, plateH/2);
    groups.framing.add(bottomPlateFront);

    const topPlateFront = box(W, studD, plateH, matBeam);
    topPlateFront.position.set(W/2, studD/2, He - plateH/2);
    groups.framing.add(topPlateFront);

    const bottomPlateRear = box(W, studD, plateH, matBeam);
    bottomPlateRear.position.set(W/2, D - studD/2, plateH/2);
    groups.framing.add(bottomPlateRear);

    const topPlateRear = box(W, studD, plateH, matBeam);
    topPlateRear.position.set(W/2, D - studD/2, He - plateH/2);
    groups.framing.add(topPlateRear);

    const bottomPlateLeft = box(studD, D, plateH, matBeam);
    bottomPlateLeft.position.set(studD/2, D/2, plateH/2);
    groups.framing.add(bottomPlateLeft);

    const topPlateLeft = box(studD, D, plateH, matBeam);
    topPlateLeft.position.set(studD/2, D/2, He - plateH/2);
    groups.framing.add(topPlateLeft);

    const bottomPlateRight = box(studD, D, plateH, matBeam);
    bottomPlateRight.position.set(W - studD/2, D/2, plateH/2);
    groups.framing.add(bottomPlateRight);

    const topPlateRight = box(studD, D, plateH, matBeam);
    topPlateRight.position.set(W - studD/2, D/2, He - plateH/2);
    groups.framing.add(topPlateRight);

    // Front wall studs with two 6' openings + center post zone
    const dw = params.doorW_ft * FT;
    const dh = params.doorH_ft * FT;
    const gp = params.gap_ft * FT;
    const xdl = params.sideReturn_ft * FT;
    const leftStart = xdl;
    const leftEnd = xdl + dw;
    const rightStart = xdl + dw + gp;
    const rightEnd = rightStart + dw;

    // Add studs along front wall, skipping openings
    for (let x = 0; x <= W + 1e-6; x += studSpacing) {
      const inLeftOpening = (x > leftStart && x < leftEnd);
      const inRightOpening = (x > rightStart && x < rightEnd);
      if (inLeftOpening || inRightOpening) continue;
      // studs sit in front wall thickness zone
      addStud(x, studD/2, 0, He - plateH);
    }

    // Center post (between doors)
    const post = box(0.09, 0.14, dh, matWood);
    post.position.set(xdl + dw + gp/2, studD/2, dh/2);
    groups.framing.add(post);

    // Headers (simple beam over each door)
    const headerH = 0.14;
    const headerD = 0.09;
    const headerL = box(dw, headerD, headerH, matBeam);
    headerL.position.set((leftStart+leftEnd)/2, studD/2, dh + headerH/2);
    groups.framing.add(headerL);

    const headerR = box(dw, headerD, headerH, matBeam);
    headerR.position.set((rightStart+rightEnd)/2, studD/2, dh + headerH/2);
    groups.framing.add(headerR);

    // Rear wall studs (simple, no window cutout yet)
    for (let x = 0; x <= W + 1e-6; x += studSpacing) {
      addStud(x, D - studD/2, 0, He - plateH);
    }
    // Left/right wall studs
    for (let y = 0; y <= D + 1e-6; y += studSpacing) {
      addStud(studD/2, y, 0, He - plateH);
      addStud(W - studD/2, y, 0, He - plateH);
    }

    // Rafters (visual)
    const rafterW = 0.038;
    const rafterD = 0.089;
    const rafterCount = Math.floor(D / studSpacing) + 1;
    for (let i = 0; i < rafterCount; i++) {
      const y = i * studSpacing;
      const angle = Math.atan2(rise, halfSpan);

      // Left rafter
      {
        const geo = new THREE.BoxGeometry(slopeLen, rafterD, rafterW);
        const m = new THREE.Mesh(geo, matWood);
        m.castShadow = true; m.receiveShadow = true;
        m.rotation.z = angle;
        m.position.set(W/2 - halfSpan/2, y, He + rise/2);
        groups.framing.add(m);
      }
      // Right rafter
      {
        const geo = new THREE.BoxGeometry(slopeLen, rafterD, rafterW);
        const m = new THREE.Mesh(geo, matWood);
        m.castShadow = true; m.receiveShadow = true;
        m.rotation.z = -angle;
        m.position.set(W/2 + halfSpan/2, y, He + rise/2);
        groups.framing.add(m);
      }
    }

    // Ridge board (visual)
    const ridge = box(0.06, D, 0.06, matBeam);
    ridge.position.set(W/2, D/2, Hr);
    groups.framing.add(ridge);

    // Dimensions overlay
    if (params.showDims) {
      // width
      addDimLine(
        new THREE.Vector3(0, -0.25, 0.02),
        new THREE.Vector3(W, -0.25, 0.02),
        `W = ${params.W_ft.toFixed(1)}'`
      );
      // depth
      addDimLine(
        new THREE.Vector3(-0.25, 0, 0.02),
        new THREE.Vector3(-0.25, D, 0.02),
        `D = ${params.D_ft.toFixed(1)}'`
      );
      // wall height
      addDimLine(
        new THREE.Vector3(W + 0.25, 0.2, 0),
        new THREE.Vector3(W + 0.25, 0.2, He),
        `He = ${params.wallH_ft.toFixed(1)}'`
      );
      // door
      addDimLine(
        new THREE.Vector3(leftStart, 0.15, 0.02),
        new THREE.Vector3(leftEnd, 0.15, 0.02),
        `Door = ${params.doorW_ft.toFixed(1)}'`
      );
      addDimLine(
        new THREE.Vector3(leftStart-0.15, 0.15, 0),
        new THREE.Vector3(leftStart-0.15, 0.15, dh),
        `Door = ${params.doorH_ft.toFixed(1)}'`
      );
    }

    groups.framing.visible = params.showFraming;
  }

  buildModel();

  // -----------------------------
  // UI wiring
  // -----------------------------
  const wallH = document.getElementById('wallH');
  const pitch = document.getElementById('pitch');
  const stud = document.getElementById('stud');

  const wallHVal = document.getElementById('wallHVal');
  const pitchVal = document.getElementById('pitchVal');
  const studVal = document.getElementById('studVal');

  function syncUI() {
    wallHVal.textContent = Number(wallH.value).toFixed(1);
    pitchVal.textContent = Number(pitch.value).toFixed(1);
    studVal.textContent = Number(stud.value).toFixed(0);
  }
  syncUI();

  wallH.addEventListener('input', () => {
    params.wallH_ft = Number(wallH.value);
    syncUI(); buildModel();
  });
  pitch.addEventListener('input', () => {
    params.pitch_rise_per12 = Number(pitch.value);
    syncUI(); buildModel();
  });
  stud.addEventListener('input', () => {
    params.studSpacing_in = Number(stud.value);
    syncUI(); buildModel();
  });

  document.getElementById('toggleFrame').addEventListener('click', () => {
    params.showFraming = !params.showFraming;
    groups.framing.visible = params.showFraming;
  });

  document.getElementById('toggleDims').addEventListener('click', () => {
    params.showDims = !params.showDims;
    buildModel();
  });

  document.getElementById('resetView').addEventListener('click', () => {
    camera.position.set(6.5, -9.5, 5.5);
    controls.target.set((params.W_ft*FT)/2, (params.D_ft*FT)/2, 1.2);
    controls.update();
  });

  // Resize
  window.addEventListener('resize', () => {
    const w = app.clientWidth, h = app.clientHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  });

  // Render loop
  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();
</script>
</body>
</html>
