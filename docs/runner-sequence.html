const slides=[...document.querySelectorAll('.slide')],dotsBox=document.getElementById('dots'),frame=document.getElementById('frame');let current=0,timer,startX=0;const dots=slides.map((_,i)=>{const b=document.createElement('button');b.className='dot'+(i?'':' active');b.onclick=()=>show(i);dotsBox.appendChild(b);return b});function show(i){current=(i+slides.length)%slides.length;slides.forEach((s,n)=>s.classList.toggle('active',n===current));dots.forEach((d,n)=>d.classList.toggle('active',n===current));restart()}function restart(){clearInterval(timer);timer=setInterval(()=>show(current+1),3600)}prev.onclick=e=>{e.stopPropagation();show(current-1)};next.onclick=e=>{e.stopPropagation();show(current+1)};frame.onclick=()=>show(current+1);frame.addEventListener('touchstart',e=>startX=e.touches[0].clientX,{passive:true});frame.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-startX;if(Math.abs(dx)>35)show(current+(dx<0?1:-1))},{passive:true});restart();
</script>
