<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="color-scheme" content="dark">
<title>Sequence · Ronu</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}html,body{min-height:100%;background:#090909}body{min-height:100svh;display:grid;place-items:center;overflow:hidden;padding:clamp(12px,3vw,34px);font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;color:#777}.shell{width:min(1480px,100%);display:grid;gap:14px}.top,.foot{display:flex;align-items:center;justify-content:space-between;padding:0 4px;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:#444}.top a{color:#777;text-decoration:none}.frame{position:relative;width:100%;aspect-ratio:2.32/1;max-height:78svh;overflow:hidden;border:1px solid #242424;border-radius:12px;background:#101010;box-shadow:0 26px 90px #0008;isolation:isolate;touch-action:pan-y}.slide{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transform:scale(1.015);transition:opacity .65s ease,transform 5s ease;filter:grayscale(1) contrast(1.06) brightness(.72)}.slide.active{opacity:1;transform:scale(1)}.young{object-position:center 52%}.present{object-position:68% center}.runner{object-position:50% 42%}.shade{position:absolute;inset:0;z-index:4;pointer-events:none;background:linear-gradient(180deg,#0001,transparent 38%,#0003),radial-gradient(circle at 50% 45%,transparent 34%,#0005 100%)}.grain{position:absolute;inset:-35%;z-index:5;pointer-events:none;opacity:.06;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 160 160' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.42'/%3E%3C/svg%3E");animation:grain .3s steps(2) infinite}@keyframes grain{0%{transform:translate(0)}50%{transform:translate(-1%,1%)}100%{transform:translate(0)}}button{border:0;background:none;color:#777;cursor:pointer}.arrow{position:absolute;top:50%;z-index:7;transform:translateY(-50%);width:54px;height:78px;font-size:2rem}.arrow.left{left:4px}.arrow.right{right:4px}.dots{display:flex;gap:8px}.dot{width:6px;height:6px;border-radius:50%;background:#242424}.dot.active{background:#777;transform:scale(1.3)}@media(max-width:720px){body{padding:12px}.frame{aspect-ratio:1.28/1;border-radius:9px}.young{object-position:60% center}.present{object-position:72% center}.runner{object-position:48% 40%}.arrow{width:42px}.top span:last-child{display:none}}@media(prefers-reduced-motion:reduce){.slide{transition:none}.grain{animation:none}}
</style>
</head>
<body>
<main class="shell">
<header class="top"><a href="/">ronu.one</a><span>temporary sequence · memory / horizon / endurance</span></header>
<section class="frame" id="frame" aria-label="Three connected visual moments">
<img class="slide young active" src="/assets/young-memory.svg" alt="Young friends watching a football game at night">
<img class="slide present" src="/assets/present-reflection.webp" alt="Present reflective view toward Manhattan">
<img class="slide runner" src="/assets/runner-perspective.webp" alt="Night runner moving beside the waterfront">
<button class="arrow left" id="prev" aria-label="Previous image">‹</button><button class="arrow right" id="next" aria-label="Next image">›</button><div class="shade"></div><div class="grain"></div>
</section>
<footer class="foot"><span>tap · swipe · arrows</span><div class="dots" id="dots"></div></footer>
</main>
<script>
const slides=[...document.querySelectorAll('.slide')],dotsBox=document.getElementById('dots'),frame=document.getElementById('frame');let current=0,timer,startX=0;const dots=slides.map((_,i)=>{const b=document.createElement('button');b.className='dot'+(i?'':' active');b.setAttribute('aria-label','Open image '+(i+1));b.onclick=()=>show(i);dotsBox.appendChild(b);return b});function show(i){current=(i+slides.length)%slides.length;slides.forEach((s,n)=>s.classList.toggle('active',n===current));dots.forEach((d,n)=>d.classList.toggle('active',n===current));restart()}function restart(){clearInterval(timer);timer=setInterval(()=>show(current+1),3600)}document.getElementById('prev').onclick=e=>{e.stopPropagation();show(current-1)};document.getElementById('next').onclick=e=>{e.stopPropagation();show(current+1)};frame.onclick=()=>show(current+1);frame.addEventListener('touchstart',e=>startX=e.touches[0].clientX,{passive:true});frame.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-startX;if(Math.abs(dx)>35)show(current+(dx<0?1:-1))},{passive:true});addEventListener('keydown',e=>{if(e.key==='ArrowRight')show(current+1);if(e.key==='ArrowLeft')show(current-1)});restart();
</script>
</body>
</html>
