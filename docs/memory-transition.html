<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<title>Memory Transition · Ronu</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--mix:0;--bg:#090909;--line:#242424}
  html,body{width:100%;min-height:100%;background:var(--bg)}
  body{min-height:100svh;display:grid;place-items:center;overflow:hidden;padding:clamp(14px,3vw,34px);font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;color:#aaa}
  .shell{width:min(1480px,100%);display:grid;gap:14px}
  .top{display:flex;align-items:center;justify-content:space-between;padding:0 4px;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#555}
  .top a{color:#777;text-decoration:none;transition:color .16s}.top a:hover,.top a:focus-visible{color:#ddd;outline:none}
  .frame{position:relative;width:100%;aspect-ratio:2.32/1;max-height:78svh;overflow:hidden;border:1px solid var(--line);border-radius:12px;background:#101010;box-shadow:0 26px 90px rgba(0,0,0,.5);isolation:isolate;cursor:ew-resize;touch-action:pan-y}
  .layer{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;filter:grayscale(1) contrast(1.08) brightness(.68);transition:opacity .055s linear}
  .young{object-position:center 52%;transform:scale(1.01);opacity:calc(1 - var(--mix))}
  .present{object-position:center center;transform:scale(1.01);opacity:var(--mix)}
  .frame::after{content:"";position:absolute;inset:0;pointer-events:none;background:linear-gradient(180deg,rgba(0,0,0,.12),transparent 35%,rgba(0,0,0,.18)),radial-gradient(circle at 52% 44%,transparent 34%,rgba(0,0,0,.26) 100%);mix-blend-mode:multiply;z-index:3}
  .grain{position:absolute;inset:-40%;z-index:4;pointer-events:none;opacity:.07;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.92' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.42'/%3E%3C/svg%3E");animation:grain .28s steps(2) infinite}
  @keyframes grain{0%{transform:translate(0,0)}25%{transform:translate(2%,-1%)}50%{transform:translate(-1%,2%)}75%{transform:translate(1%,1%)}100%{transform:translate(0,0)}}
  .footer{display:flex;align-items:center;justify-content:space-between;padding:0 4px;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:#444}
  .meter{width:120px;height:1px;background:#222;position:relative}.meter span{position:absolute;inset:0 auto 0 0;width:calc(var(--mix)*100%);background:#888}
  @media(max-width:720px){body{padding:12px}.frame{aspect-ratio:1.55/1;border-radius:9px}.young{object-position:58% center}.present{object-position:62% center}.footer{font-size:8px}.meter{width:76px}}
  @media(prefers-reduced-motion:reduce){.grain{animation:none}.layer{transition:none}}
</style>
</head>
<body>
<main class="shell">
  <header class="top"><a href="/">ronu.one</a><span>temporary frame · then / now</span></header>
  <section class="frame" id="frame" aria-label="A visual transition from an earlier football-field memory to a present-day reflective view">
    <img class="layer young" id="young" alt="Earlier memory: friends watching a football game at night">
    <img class="layer present" id="present" alt="Present reflection: an anonymous figure looking toward the Manhattan skyline">
    <div class="grain"></div>
  </section>
  <footer class="footer"><span>move · scroll · tap</span><div class="meter"><span></span></div></footer>
</main>
<script>
  const frame=document.getElementById('frame');
  const young=document.getElementById('young');
  const present=document.getElementById('present');
  let mix=0,target=0,auto=true,direction=1;

  fetch('/').then(r=>r.text()).then(html=>{
    const doc=new DOMParser().parseFromString(html,'text/html');
    const source=doc.querySelector('.maker-artifact img');
    if(source?.src) young.src=source.src;
  }).catch(()=>{});

  fetch('https://raw.githubusercontent.com/the-reno/the-reno.github.io/0bdcf1a85ccdf125f3c89e0092d1cc2007ad1189/docs/memory-transition.html')
    .then(r=>r.text()).then(html=>{
      const doc=new DOMParser().parseFromString(html,'text/html');
      const source=doc.querySelector('.present');
      if(source?.src) present.src=source.src;
    }).catch(()=>{});

  const setTarget=v=>{auto=false;target=Math.max(0,Math.min(1,v))};
  frame.addEventListener('pointermove',e=>{if(e.pointerType==='mouse'){const r=frame.getBoundingClientRect();setTarget((e.clientX-r.left)/r.width)}});
  frame.addEventListener('pointerleave',()=>{auto=true});
  frame.addEventListener('click',()=>setTarget(target>.5?0:1));
  addEventListener('wheel',e=>setTarget(target+Math.sign(e.deltaY)*.22),{passive:true});
  addEventListener('keydown',e=>{if(e.key==='ArrowRight')setTarget(target+.28);if(e.key==='ArrowLeft')setTarget(target-.28);if(e.key===' ')setTarget(target>.5?0:1)});

  function loop(){
    if(auto){target+=direction*.006;if(target>=1){target=1;direction=-1}else if(target<=0){target=0;direction=1}}
    mix+=(target-mix)*.2;
    document.documentElement.style.setProperty('--mix',mix.toFixed(4));
    requestAnimationFrame(loop)
  }
  loop();
</script>
</body>
</html>
