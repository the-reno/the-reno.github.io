<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Garage Structural 3D Viewer</title>
  <style>
    html, body { height:100%; margin:0; background:#0b0c10; color:#e8e8e8; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial; }
    #app { height:100%; width:100%; position:relative; }
    canvas { display:block; }
    .hud{
      position:absolute; left:12px; top:12px; z-index:10;
      background:rgba(0,0,0,.6); border:1px solid rgba(255,255,255,.12);
      border-radius:10px; padding:10px 12px; max-width: 380px;
      backdrop-filter: blur(6px);
    }
    .hud h1 { font-size:14px; margin:0 0 8px; font-weight:600; }
    .row { display:flex; gap:10px; align-items:center; margin:6px 0; }
    .row label { font-size:12px; opacity:.9; min-width:130px; }
    .row input[type="range"] { width: 180px; }
    .row .val { font-variant-numeric: tabular-nums; font-size:12px; opacity:.9; width:60px; text-align:right; }
    .btns { display:flex; gap:8px; margin-top:8px; flex-wrap:wrap; }
    button{
      background:#151823; color:#e8e8e8; border:1px solid rgba(255,255,255,.12);
      padding:7px 10px; border-radius:9px; cursor:pointer; font-size:12px;
    }
    .hint { margin-top:8px; font-size:12px; opacity:.8; line-height:1.35; }
    .err{
      margin-top:8px; font-size:12px; color:#ffb3b3; display:none; line-height:1.35;
      border-top:1px solid rgba(255,255,255,.12); padding-top:8px;
    }
  </style>
</head>
<body>
<div id="app">
  <div class="hud">
    <h1>Garage Structural 3D Viewer (21' × 20')</h1>

    <div class="row">
      <label>Wall height (ft)</label>
      <input id="wallH" type="range" min="7" max="10" step="0.1" value="8.0" />
      <div class="val" id="wallHVal">8.0</div>
    </div>

    <div class="row">
      <label>Roof pitch (rise/12)</label>
      <input id="pitch" type="range" min="4" max="12" step="0.5" value="8" />
      <div class="val" id="pitchVal">8.0</div>
    </div>

    <div class="row">
      <label>Stud spacing (in)</label>
      <input id="stud" type="range" min="16" max="24" step="2" value="16" />
      <div class="val" id="studVal">16</div>
    </div>

    <div class="btns">
      <button id="toggleFrame">Toggle framing</button>
      <button id="toggleDims">Toggle dimensions</button>
      <button id="resetView">Reset view</button>
    </div>

    <div class="hint">
      Mouse: <b>Left</b> rotate · <b>Wheel</b> zoom · <b>Right</b> pan<br/>
      Touch: <b>1 finger</b> rotate · <b>2 fingers</b> pan/zoom
    </div>

    <div class="err" id="errBox"></div>
  </div>
</div>

<!-- Local (self-hosted) scripts -->
<script src="./vendor/three.min.js"></script>
<script src="./vendor/OrbitControls.js"></script>
<script src="./garage-3d.js" defer></script>
</body>
</html>
