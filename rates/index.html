<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SOFR Rolling Investment Simulator</title><style>:root{font-family:Arial,sans-serif;color:#172033;background:#f5f7fb}body{margin:0}main{max-width:1100px;margin:auto;padding:32px 18px}.card{background:#fff;border:1px solid #dfe6ef;border-radius:14px;padding:20px;margin:16px 0}.grid{display:grid;grid-template-columns:repeat(3,minmax(180px,1fr));gap:14px;align-items:end}label{display:grid;gap:6px;font-weight:700}input,textarea,button{box-sizing:border-box;width:100%;padding:10px;border-radius:8px;border:1px solid #bdc8d6}button{background:#145da0;color:#fff;border:0;font-weight:700;cursor:pointer}table{width:100%;border-collapse:collapse;font-size:13px}th,td{border-bottom:1px solid #e6ebf2;padding:8px;text-align:right}th{background:#eef4fa;position:sticky;top:0}th:nth-child(-n+3),td:nth-child(-n+3){text-align:left}.scroll{max-height:520px;overflow:auto}.ok{color:#064;font-weight:700}.err{color:#900;font-weight:700}@media(max-width:720px){.grid{grid-template-columns:1fr}}</style></head><body><main><h1>SOFR Rolling Investment Simulator</h1><p>All tenors use the same monthly roll dates. Missing dates move to the previous available curve date.</p><section class="card grid"><label>Final end date<input id="analysisDate" type="date" value="2026-06-26"></label><label>Analysis period, years<input id="periodYears" type="number" min="0.25" step="0.25" value="1"></label><button onclick="runModel()">Run simulation</button></section><section class="card"><h3>Curve input</h3><p>CSV headers: <b>Date,ON,1M,2M,3M,6M</b>. Dates must be YYYY-MM-DD. Rates may be decimal or percentage.</p><textarea id="csv" rows="10"></textarea><p><button onclick="createFlatCurve()">Create sample flat curve</button></p><div id="statusBox"></div></section><section class="card"><h3>Validation</h3><div id="validation"></div></section><section class="card"><h3>Output</h3><div class="scroll"><table id="outputTable"></table></div></section></main><script>const TENORS=[{name:'ON',months:0},{name:'1M',months:1},{name:'2M',months:2},{name:'3M',months:3},{name:'6M',months:6}];let curve=[];let byDate=new Map();function d(s){const a=String(s).slice(0,10).split('-').map(Number);return new Date(Date.UTC(a[0],a[1]-1,a[2]))}function iso(x){return x.toISOString().slice(0,10)}function addMonthsFixed(base,n,day){const t=new Date(Date.UTC(base.getUTCFullYear(),base.getUTCMonth()+n,1));const last=new Date(Date.UTC(t.getUTCFullYear(),t.getUTCMonth()+1,0)).getUTCDate();return new Date(Date.UTC(t.getUTCFullYear(),t.getUTCMonth(),Math.min(day,last)))}function parseRate(x){x=String(x??'').trim();if(!x)return NaN;if(x.endsWith('%'))return parseFloat(x)/100;const v=parseFloat(x);return v>1?v/100:v}function parseCurve(){const lines=csv.value.trim().split(/\r?\n/).filter(Boolean);if(lines.length<2)throw new Error('Paste curve data first.');const h=lines[0].split(',').map(x=>x.trim().toUpperCase());const idx={};h.forEach((x,i)=>idx[x]=i);if(idx.DATE===undefined)throw new Error('CSV requires Date column.');curve=lines.slice(1).map(line=>{const c=line.split(',').map(x=>x.trim());const row={date:d(c[idx.DATE])};TENORS.forEach(t=>row[t.name]=idx[t.name]===undefined?NaN:parseRate(c[idx[t.name]]));return row}).filter(x=>!Number.isNaN(x.date.getTime())).sort((a,b)=>a.date-b.date);if(!curve.length)throw new Error('No valid curve dates found.');byDate=new Map(curve.map(x=>[iso(x.date),x]))}function prevCurveDate(target){let lo=0,hi=curve.length-1,ans=null;while(lo<=hi){const m=(lo+hi)>>1;if(curve[m].date<=target){ans=curve[m].date;lo=m+1}else hi=m-1}return ans}function buildLadder(finalInput,years){const day=finalInput.getUTCDate();const finalDate=prevCurveDate(finalInput);if(!finalDate)throw new Error('Final date is before available curve history.');const months=Math.round(years*12);const analysisStartTarget=addMonthsFixed(finalInput,-months,day);const analysisStart=prevCurveDate(analysisStartTarget);if(!analysisStart)throw new Error('Curve does not cover the requested analysis start.');const bufferTarget=addMonthsFixed(analysisStartTarget,-6,day);const ladder=[];for(let i=0;i<=months+6;i++){const target=addMonthsFixed(bufferTarget,i,day);const adjusted=prevCurveDate(target);if(adjusted&&(!ladder.length||iso(adjusted)!==iso(ladder[ladder.length-1])))ladder.push(adjusted)}return{ladder,finalDate,analysisStart}}function runModel(){try{parseCurve();const years=Number(periodYears.value);if(!(years>0))throw new Error('Analysis period must be positive.');const finalInput=d(analysisDate.value);const {ladder,finalDate,analysisStart}=buildLadder(finalInput,years);const rows=[];for(let i=0;i<ladder.length;i++){const end=ladder[i];if(end<analysisStart||end>finalDate)continue;for(const t of TENORS){let start;if(t.name==='ON'){start=prevCurveDate(new Date(end.getTime()-86400000))}else{start=ladder[i-t.months]}if(!start)continue;const rateRow=byDate.get(iso(start));if(!rateRow)continue;const rate=rateRow[t.name];if(!Number.isFinite(rate))continue;const days=Math.round((end-start)/86400000);if(days<=0)continue;rows.push({start,end,tenor:t.name,rate,days,factor:1+rate*days/360})}}render(rows,analysisStart,finalDate);statusBox.innerHTML='<span class="ok">Simulation completed.</span>'}catch(e){statusBox.innerHTML='<span class="err">'+e.message+'</span>';validation.innerHTML='';outputTable.innerHTML=''}}function render(rows,start,end){validation.innerHTML=`Adjusted analysis start: <b>${iso(start)}</b> | Adjusted final date: <b>${iso(end)}</b> | Rows: <b>${rows.length}</b>`;outputTable.innerHTML='<tr><th>Start</th><th>End</th><th>Tenor</th><th>Rate</th><th>Days</th><th>Factor</th></tr>'+rows.map(r=>`<tr><td>${iso(r.start)}</td><td>${iso(r.end)}</td><td>${r.tenor}</td><td>${(r.rate*100).toFixed(4)}%</td><td>${r.days}</td><td>${r.factor.toFixed(6)}</td></tr>`).join('')}function createFlatCurve(){const start=d('2024-01-01'),end=d('2026-12-31'),rate=.04;const lines=['Date,ON,1M,2M,3M,6M'];for(let x=new Date(start);x<=end;x=new Date(x.getTime()+86400000)){const w=x.getUTCDay();if(w!==0&&w!==6)lines.push(`${iso(x)},${rate},${rate},${rate},${rate},${rate}`)}csv.value=lines.join('\n');runModel()}createFlatCurve();</script></body></html>
