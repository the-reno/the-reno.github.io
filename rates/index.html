<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Curve Roll Model</title><style>body{font-family:Arial,sans-serif;background:#f7f7f7;margin:22px;color:#111}.card{background:#fff;border:1px solid #ddd;border-radius:8px;padding:14px;margin:12px 0}.grid{display:grid;grid-template-columns:repeat(5,minmax(120px,1fr));gap:10px}input,textarea,button{width:100%;box-sizing:border-box;padding:8px;margin-top:4px}button{font-weight:700}.row{display:flex;gap:10px;margin-top:10px}.row>*{flex:1}.note{font-size:12px;color:#555}table{border-collapse:collapse;width:100%;font-size:12px;background:white}th,td{border:1px solid #ddd;padding:6px;text-align:right;white-space:nowrap}th{background:#eee}.left{text-align:left}.scroll{max-height:360px;overflow:auto}.ok{color:#064;font-weight:700}.err{color:#900;font-weight:700}</style></head><body><h1>Curve Roll Model</h1><div class="note">Test page for CurveCalc and MonthlyAnalysis. Rates are taken from placement date. Roll dates are built backward from the analysis date.</div><div class="card"><h3>Inputs</h3><div class="grid"><div><label>Analysis Date</label><input id="analysisDate" type="date" value="2026-06-26"></div><div><label>Period Years</label><input id="periodYears" type="number" step="0.25" value="1"></div><div><label>Flat Rate</label><input id="flatRate" value="1.00%"></div><div><label>Curve Start</label><input id="curveStart" type="date" value="2025-01-02"></div><div><label>Curve End</label><input id="curveEnd" type="date" value="2026-12-31"></div></div><div class="row"><button onclick="createFlatCurve()">Create Flat Curve</button><button onclick="runModel()">Run Model</button><button onclick="downloadRates()">Download CSV</button></div><div id="status" class="note"></div></div><div class="card"><h3>Rates Input</h3><textarea id="csv" rows="7"></textarea></div><div class="card"><h3>Validation</h3><div id="validation" class="note"></div></div><div class="card"><h3>CurveCalc</h3><div class="scroll"><table id="curveTable"></table></div></div><div class="card"><h3>MonthlyAnalysis</h3><div class="scroll"><table id="monthlyTable"></table></div></div><script>const TENORS=['ON','1M','2M','3M','6M'];let rates=[],curveCalc=[],monthly=[];function parseRate(x){x=String(x??'').trim();if(!x)return NaN;if(x.endsWith('%'))return parseFloat(x)/100;let v=parseFloat(x);return v>1?v/100:v}function fmtDate(d){return new Date(d).toISOString().slice(0,10)}function fmtRate(x){return isFinite(x)?(x*100).toFixed(4)+'%':''}function fmtFactor(x){return isFinite(x)?Number(x).toFixed(6):''}function dkey(d){let x=new Date(d);return new Date(x.getFullYear(),x.getMonth(),x.getDate()).getTime()}function addDays(d,n){let x=new Date(d);x.setDate(x.getDate()+n);return x}function addMonths(d,n){let x=new Date(d),day=x.getDate();x.setMonth(x.getMonth()+n);if(x.getDate()<day)x.setDate(0);return x}function isBiz(d){let w=new Date(d).getDay();return w!==0&&w!==6}function createFlatCurve(){let s=new Date(curveStart.value),e=new Date(curveEnd.value),r=parseRate(flatRate.value);let rows=['Date,ON,1M,2M,3M,6M'];for(let d=new Date(s);d<=e;d=addDays(d,1))if(isBiz(d))rows.push([fmtDate(d),r,r,r,r,r].join(','));csv.value=rows.join('\n');status.innerHTML='<span class=ok>Flat curve created.</span>'}function parseCSV(text){let lines=text.trim().split(/\r?\n/).filter(Boolean),h=lines[0].split(',').map(x=>x.trim().toUpperCase()),idx={};h.forEach((x,i)=>idx[x]=i);let out=[];for(let i=1;i<lines.length;i++){let c=lines[i].split(',').map(x=>x.trim()),d=new Date(c[idx.DATE]);if(isNaN(d))continue;let row={Date:new Date(d.getFullYear(),d.getMonth(),d.getDate())};for(const t of TENORS)row[t]=parseRate(c[idx[t]]);out.push(row)}return out.sort((a,b)=>a.Date-b.Date)}function firstRateOnOrAfter(target){let t=dkey(target);for(const r of rates)if(dkey(r.Date)>=t)return r.Date;return null}function curveRow(date){let k=dkey(date);return curveCalc.find(r=>dkey(r.Date)===k)}function previousCurveOnOrBefore(target){let t=dkey(target),best=null;for(const r of curveCalc){if(dkey(r.Date)<=t)best=r.Date;else break}if(!best)throw Error('No curve date on/before '+fmtDate(target));return best}function maturityDate(trade,tenor){if(tenor==='ON'){let t=dkey(trade);for(const r of rates)if(dkey(r.Date)>t)return r.Date;return null}return firstRateOnOrAfter(addMonths(trade,parseInt(tenor)))}function buildCurveCalc(){curveCalc=[];for(const rr of rates){let row={Date:rr.Date};for(const t of TENORS){let end=maturityDate(rr.Date,t),rate=rr[t];row[t+'_Rate']=rate;row[t+'_End']=end;if(end&&isFinite(rate)){let days=Math.round((end-rr.Date)/86400000);row[t+'_Days']=days;row[t+'_Factor']=1+rate*days/360}else{row[t+'_Days']='';row[t+'_Factor']=''}}curveCalc.push(row)}}function buildBackwardRolls(analysis,years){let m=Math.round(years*12),tmp=[previousCurveOnOrBefore(analysis)];for(let i=1;i<=m;i++)tmp.push(previousCurveOnOrBefore(addMonths(tmp[0],-i)));return tmp.reverse()}function compoundON(start,end){let d=start,res=1;while(dkey(d)<dkey(end)){let r=curveRow(d);if(!r||!r.ON_End)return '';if(dkey(r.ON_End)>dkey(end)){let days=Math.round((end-d)/86400000);res*=1+r.ON_Rate*days/360;d=end}else{res*=r.ON_Factor;d=r.ON_End}}return res}function buildMonthly(){monthly=[];let analysis=previousCurveOnOrBefore(new Date(analysisDate.value)),rolls=buildBackwardRolls(analysis,parseFloat(periodYears.value));for(let i=0;i<rolls.length-1;i++){let r=curveRow(rolls[i]);monthly.push({AnalysisDate:analysis,Start:rolls[i],End:rolls[i+1],ON_Factor:compoundON(rolls[i],rolls[i+1]),M1_Factor:r?.['1M_Factor']??'',M2_Factor:'',M3_Factor:'',M6_Factor:''})}fillTerm('2M','M2_Factor');fillTerm('3M','M3_Factor');fillTerm('6M','M6_Factor')}function fillTerm(t,key){for(const m of monthly){let r=curveRow(m.Start);if(!r)continue;let target=monthly.find(x=>r[t+'_End']&&dkey(x.End)===dkey(r[t+'_End']));if(target)target[key]=r[t+'_Factor']}}function validate(){let analysis=previousCurveOnOrBefore(new Date(analysisDate.value));validation.innerHTML='Analysis date used: <b>'+fmtDate(analysis)+'</b>. '+TENORS.map(t=>{let s=curveCalc.filter(r=>r[t+'_End']&&dkey(r[t+'_End'])===dkey(analysis));return s.length?'<span class=ok>'+t+' settles</span>':'<span class=err>'+t+' missing</span>'}).join(' | ')}function runModel(){try{rates=parseCSV(csv.value);buildCurveCalc();buildMonthly();validate();render();status.innerHTML='<span class=ok>Model completed.</span>'}catch(e){status.innerHTML='<span class=err>'+e.message+'</span>'}}function render(){writeTable('curveTable',['Date','ON_End','ON_Factor','1M_End','1M_Factor','2M_End','2M_Factor','3M_End','3M_Factor','6M_End','6M_Factor'],curveCalc.slice(0,500).map(r=>[fmtDate(r.Date),r.ON_End?fmtDate(r.ON_End):'',fmtFactor(r.ON_Factor),r['1M_End']?fmtDate(r['1M_End']):'',fmtFactor(r['1M_Factor']),r['2M_End']?fmtDate(r['2M_End']):'',fmtFactor(r['2M_Factor']),r['3M_End']?fmtDate(r['3M_End']):'',fmtFactor(r['3M_Factor']),r['6M_End']?fmtDate(r['6M_End']):'',fmtFactor(r['6M_Factor'])]));writeTable('monthlyTable',['AnalysisDate','Start','End','ON_Factor','1M_Factor','2M_Factor','3M_Factor','6M_Factor'],monthly.map(r=>[fmtDate(r.AnalysisDate),fmtDate(r.Start),fmtDate(r.End),fmtFactor(r.ON_Factor),fmtFactor(r.M1_Factor),fmtFactor(r.M2_Factor),fmtFactor(r.M3_Factor),fmtFactor(r.M6_Factor)]))}function writeTable(id,heads,rows){document.getElementById(id).innerHTML='<tr>'+heads.map((h,i)=>'<th class='+(i<3?'left':'')+'>'+h+'</th>').join('')+'</tr>'+rows.map(r=>'<tr>'+r.map((x,i)=>'<td class='+(i<3?'left':'')+'>'+(x??'')+'</td>').join('')+'</tr>').join('')}function downloadRates(){let b=new Blob([csv.value],{type:'text/csv'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='flat_curve.csv';a.click()}createFlatCurve();</script></body></html>
