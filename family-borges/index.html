<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ronu — index_new</title>
  <meta name="description" content="Ronu — welcome to my lab." />

  <style>
    :root{
      --void:#05040a;
      --ink:#0d0b14;
      --fog:rgba(255,255,255,0.45);
      --mist:rgba(255,255,255,0.18);
      --soft:rgba(255,255,255,0.28);
      --hard:rgba(255,255,255,0.92);
      --glass:rgba(0,0,0,0.35);
      --glass2:rgba(0,0,0,0.45);
      --line:rgba(255,255,255,0.14);
      --line2:rgba(255,255,255,0.22);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background:var(--void);
      color:var(--hard);
      font-family: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
      overflow-x:hidden;
    }

    a{color:inherit}

    /* ======= PANEL SLIDER ======= */
    .panel-slider{
      position: relative;
      width: 100%;
      overflow: hidden;
      background: var(--void);
    }

    .panel-track{
      display: flex;
      width: 100%;
      transform: translateX(0%);
      transition: transform 520ms cubic-bezier(.2,.9,.2,1);
      will-change: transform;
    }

    .panel{
      min-width: 100%;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(1200px 700px at 20% 10%, rgba(255,255,255,0.06), transparent 55%),
        linear-gradient(180deg, var(--void) 0%, var(--void) 100%);
      color: var(--hard);
    }

    .panel-inner{
      width: min(980px, 86vw);
      padding: 10vh 0;
    }

    /* ======= PANEL 1 (hero) ======= */
    .hero-title{
      margin: 0;
      line-height: 0.92;
      letter-spacing: -0.02em;
      user-select:none;
    }
    .hero-title-strong{
      font-size: clamp(56px, 8vw, 112px);
      font-weight: 600;
      color: rgba(255,255,255,0.95);
    }
    .hero-title-soft{
      font-size: clamp(56px, 8vw, 112px);
      font-weight: 600;
      color: rgba(255,255,255,0.22);
      font-style: italic;
    }

    .hero-sub{
      margin: 34px 0 0;
      font-size: clamp(16px, 2.2vw, 26px);
      color: rgba(255,255,255,0.38);
      letter-spacing: 0.06em;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    /* ======= PANEL 2 ======= */
    .panel-title{
      margin: 0;
      font-size: clamp(34px, 4vw, 54px);
      color: rgba(255,255,255,0.88);
      letter-spacing: -0.01em;
      user-select:none;
    }
    .panel-copy{
      margin: 18px 0 0;
      font-size: clamp(16px, 2vw, 22px);
      color: rgba(255,255,255,0.45);
      line-height: 1.55;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
    }

    .panel-actions{
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 26px;
    }

    .btn-ghost{
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid var(--line);
      color: rgba(255,255,255,0.72);
      text-decoration: none;
      background: rgba(255,255,255,0.02);
      transition: transform 140ms ease, border-color 140ms ease, background 140ms ease;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 13px;
      letter-spacing: 0.05em;
    }
    .btn-ghost:hover{
      transform: translateY(-1px);
      border-color: var(--line2);
      background: rgba(255,255,255,0.04);
    }

    /* ======= NAV BUTTONS ======= */
    .panel-nav{
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 44px;
      height: 44px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--glass);
      color: rgba(255,255,255,0.75);
      cursor: pointer;
      display: grid;
      place-items: center;
      font-size: 22px;
      line-height: 1;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      transition: transform 140ms ease, border-color 140ms ease, background 140ms ease, opacity 140ms ease;
    }
    .panel-nav:hover{
      transform: translateY(-50%) scale(1.03);
      border-color: var(--line2);
      background: var(--glass2);
    }
    .panel-nav.left{ left: 16px; }
    .panel-nav.right{ right: 16px; }
    .panel-nav:disabled{ cursor: default; }

    /* ======= DOTS ======= */
    .panel-dots{
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
    }
    .dot{
      width: 8px;
      height: 8px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.22);
      background: rgba(255,255,255,0.10);
      cursor: pointer;
      padding: 0;
      outline: none;
    }
    .dot[aria-current="true"]{
      background: rgba(255,255,255,0.50);
      border-color: rgba(255,255,255,0.45);
    }

    /* ======= OPTIONAL SECTION ANCHORS ======= */
    .anchor-section{
      padding: 80px 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent 40%);
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .anchor-inner{
      width: min(980px, 86vw);
      margin: 0 auto;
      color: rgba(255,255,255,0.55);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      line-height: 1.6;
    }
    .anchor-inner h3{
      margin: 0 0 10px;
      color: rgba(255,255,255,0.78);
      letter-spacing: -0.01em;
    }

    /* Reduce motion */
    @media (prefers-reduced-motion: reduce){
      .panel-track{ transition: none; }
      .panel-nav, .btn-ghost{ transition: none; }
    }
  </style>
</head>

<body>
  <!-- Page address: ronu.one/index_new (save as index_new.html and route accordingly) -->

  <section class="panel-slider" aria-label="Hero panels">
    <div class="panel-track" id="panelTrack">
      <!-- Panel 1 -->
      <article class="panel panel-1">
        <div class="panel-inner">
          <h1 class="hero-title">
            <span class="hero-title-strong">I'm</span>
            <span class="hero-title-soft"> Ronu.</span>
          </h1>
          <p class="hero-sub">Welcome to my lab.</p>
        </div>
      </article>

      <!-- Panel 2 -->
      <article class="panel panel-2">
        <div class="panel-inner">
          <h2 class="panel-title">More coming.</h2>
          <p class="panel-copy">
            Experiments in markets, code, and design.<br />
            Dashboards, tools, and notes — shipping soon.
          </p>

          <div class="panel-actions">
            <a class="btn-ghost" href="#work">EXPLORE</a>
            <a class="btn-ghost" href="#contact">CONTACT</a>
          </div>
        </div>
      </article>
    </div>

    <button class="panel-nav left" type="button" id="panelPrev" aria-label="Previous panel">‹</button>
    <button class="panel-nav right" type="button" id="panelNext" aria-label="Next panel">›</button>

    <div class="panel-dots" role="tablist" aria-label="Panel selector">
      <button class="dot" type="button" data-go="0" aria-label="Go to panel 1" aria-current="true"></button>
      <button class="dot" type="button" data-go="1" aria-label="Go to panel 2"></button>
    </div>
  </section>

  <!-- Optional anchor sections so the buttons have targets -->
  <section id="work" class="anchor-section">
    <div class="anchor-inner">
      <h3>Work</h3>
      <div>Placeholder section. Replace with your projects, links, dashboards, etc.</div>
    </div>
  </section>

  <section id="contact" class="anchor-section">
    <div class="anchor-inner">
      <h3>Contact</h3>
      <div>Placeholder section. Replace with your email / socials.</div>
    </div>
  </section>

  <script>
    (() => {
      const track = document.getElementById('panelTrack');
      const prev = document.getElementById('panelPrev');
      const next = document.getElementById('panelNext');
      const dots = Array.from(document.querySelectorAll('.panel-dots .dot'));
      const panels = Array.from(track.children);

      let index = 0;

      const clamp = (i) => Math.max(0, Math.min(i, panels.length - 1));

      function render(){
        track.style.transform = `translateX(-${index * 100}%)`;
        dots.forEach((d, i) => d.setAttribute('aria-current', i === index ? 'true' : 'false'));
        prev.disabled = index === 0;
        next.disabled = index === panels.length - 1;
        prev.style.opacity = prev.disabled ? '0.45' : '1';
        next.style.opacity = next.disabled ? '0.45' : '1';
      }

      function go(i){
        index = clamp(i);
        render();
      }

      prev.addEventListener('click', () => go(index - 1));
      next.addEventListener('click', () => go(index + 1));

      dots.forEach(d => d.addEventListener('click', () => go(Number(d.dataset.go))));

      window.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') go(index - 1);
        if (e.key === 'ArrowRight') go(index + 1);
      });

      // Basic swipe
      let startX = null;
      track.addEventListener('touchstart', (e) => { startX = e.touches[0].clientX; }, {passive:true});
      track.addEventListener('touchend', (e) => {
        if (startX === null) return;
        const endX = e.changedTouches[0].clientX;
        const dx = endX - startX;
        startX = null;
        if (Math.abs(dx) < 40) return;
        if (dx > 0) go(index - 1);
        else go(index + 1);
      }, {passive:true});

      render();
    })();
  </script>
</body>
</html>
