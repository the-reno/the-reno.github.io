<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ronu | 3D Workspace</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      min-height: 100vh;
      background: #0a0a0a;
      color: #a8a8a8;
      font-family: 'DM Mono', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      perspective: 2000px; /* Depth intensity */
    }

    /* 3D Scene Wrapper */
    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      transform-style: preserve-3d;
      transform: rotateX(20deg) rotateY(-10deg); /* Slight tilt for depth */
      transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .scene:hover {
      transform: rotateX(15deg) rotateY(-5deg);
    }

    /* Common Card Styling */
    .card {
      position: absolute;
      border: 1px solid #1f1f1f;
      border-radius: 8px;
      background: #111;
      padding: 2.5rem;
      box-shadow: 20px 20px 60px rgba(0,0,0,0.8);
      transition: all 0.5s ease;
      text-decoration: none;
    }

    /* Main Focus Card */
    .card-main {
      width: 480px;
      z-index: 10;
      transform: translateZ(100px); /* Brings it forward */
      border-color: #333;
    }

    /* Smaller Satellite Panels */
    .card-sub {
      width: 280px;
      padding: 1.5rem;
      opacity: 0.4;
      transform: translateZ(0);
      filter: grayscale(1);
    }

    .card-sub:hover {
      opacity: 1;
      filter: grayscale(0);
      transform: translateZ(50px) translateY(-10px);
      border-color: #efefef;
    }

    /* Positioning the satellites */
    .markets { top: 10%; left: 15%; transform: rotateY(20deg) translateZ(-50px); }
    .science { top: 55%; left: 10%; transform: rotateY(25deg) translateZ(-100px); }
    .sports  { top: 15%; right: 15%; transform: rotateY(-20deg) translateZ(-50px); }
    .logbook { top: 60%; right: 10%; transform: rotateY(-25deg) translateZ(-100px); }

    /* Typography from your source */
    .greeting {
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #444;
      margin-bottom: 1rem;
    }
    h1, h2 {
      font-family: 'Instrument Serif', serif;
      font-weight: 400;
      color: #efefef;
      line-height: 1;
      margin-bottom: 1rem;
    }
    h1 { font-size: 3rem; }
    h2 { font-size: 1.8rem; }
    h1 em, h2 em { font-style: italic; color: #555; }
    
    p {
      font-size: 11px;
      line-height: 1.6;
      color: #666;
    }

    .divider { height: 1px; background: #1f1f1f; margin: 1.5rem 0; }
    .stack { font-size: 10px; color: #444; letter-spacing: 0.05em; text-transform: lowercase; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px) translateZ(50px); }
      to   { opacity: 1; transform: translateY(0) translateZ(100px); }
    }

    .card-main { animation: fadeIn 1.2s ease forwards; }

  </style>
</head>
<body>

  <div class="scene">
    
    <a href="#markets" class="card card-sub markets">
      <p class="greeting">// 01</p>
      <h2><em>Markets</em></h2>
      <p>Quant Finance & FX</p>
    </a>

    <a href="#science" class="card card-sub science">
      <p class="greeting">// 02</p>
      <h2>Science</h2>
      <p>Quantum & Fluid Dynamics</p>
    </a>

    <div class="card card-main">
      <p class="greeting">// hello, world</p>
      <h1>I'm <em>Ronu.</em></h1>
      <p>Welcome to my lab.</p>
      <div class="divider"></div>
      <p class="stack">triathlon · science · markets</p>
    </div>

    <a href="#sports" class="card card-sub sports">
      <p class="greeting">// 03</p>
      <h2><em>Sports</em></h2>
      <p>Ironman Training</p>
    </a>

    <a href="#logbook" class="card card-sub logbook">
      <p class="greeting">// 04</p>
      <h2>Logbook</h2>
      <p>Sketches & Sailing</p>
    </a>

  </div>

</body>
</html>
