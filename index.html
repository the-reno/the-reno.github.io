<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ronu</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0a0a0a;
      color: #a8a8a8;
      font-family: 'DM Mono', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 420px;
      perspective: 1100px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      position: absolute;
      width: 340px;
      border: 1px solid #1f1f1f;
      border-radius: 8px;
      padding: 2.5rem 2.25rem;
      background: #111;
      cursor: pointer;
      transition: transform 0.55s cubic-bezier(0.4,0,0.2,1),
                  opacity  0.55s ease,
                  filter   0.55s ease;
      transform-style: preserve-3d;
      transform-origin: center center;
      user-select: none;
    }

    .greeting {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #444;
      margin-bottom: 1rem;
    }

    h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 2.6rem;
      font-weight: 400;
      color: #efefef;
      line-height: 1;
      letter-spacing: -0.02em;
      margin-bottom: 1.25rem;
    }
    h1 em { font-style: italic; color: #555; }

    .card-body {
      font-size: 12px;
      line-height: 1.9;
      color: #666;
      margin-bottom: 1.75rem;
      min-height: 72px;
    }

    .divider { height: 1px; background: #1f1f1f; margin-bottom: 1.25rem; }
    .tag { font-size: 11px; color: #444; letter-spacing: 0.05em; }

    .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #333;
      font-size: 2rem;
      cursor: pointer;
      z-index: 100;
      padding: 1rem;
      transition: color 0.2s;
      font-family: 'DM Mono', monospace;
      line-height: 1;
    }
    .arrow:hover { color: #888; }
    .arrow.left  { left: 1rem; }
    .arrow.right { right: 1rem; }

    .dots {
      display: flex;
      gap: 6px;
      margin-top: 2rem;
    }
    .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #1f1f1f;
      transition: background 0.2s, transform 0.2s;
      cursor: pointer;
    }
    .dot.active { background: #555; transform: scale(1.35); }
  </style>
</head>
<body>

  <div class="stage" id="stage">

    <!-- 0 · Intro -->
    <div class="card" data-index="0">
      <p class="greeting">// hello, world</p>
      <h1>I'm <em>Ronu.</em></h1>
      <p class="card-body">
        Welcome to my lab.
      </p>
      <div class="divider"></div>
      <p class="tag">triathlon · science · markets</p>
    </div>

    <!-- 1 · Triathlon -->
    <div class="card" data-index="1">
      <p class="greeting">// 01 · endurance</p>
      <h1><em>Triathlon.</em></h1>
      <p class="card-body">
        Swim, bike, run. Repeat until the numbers improve.
      </p>
    </div>

    <!-- 2 · Science -->
    <div class="card" data-index="2">
      <p class="greeting">// 02 · inquiry</p>
      <h1><em>Science.</em></h1>
      <p class="card-body">
        Abstract things visible.
      </p>
    </div>

    <!-- 3 · Markets -->
    <div class="card" data-index="3">
      <p class="greeting">// 03 · finance</p>
      <h1><em>Markets.</em></h1>
      <p class="card-body">
        Sharp edges.
      </p>
    </div>

    <!-- 4 · Maker -->
    <div class="card" data-index="4">
      <p class="greeting">// 04 · craft</p>
      <h1><em>Maker.</em></h1>
      <p class="card-body">
        Loading.
      </p>
    </div>

  </div>

  <button class="arrow left"  id="prev">&#8249;</button>
  <button class="arrow right" id="next">&#8250;</button>

  <div class="dots" id="dots"></div>

  <script>
    const cards = Array.from(document.querySelectorAll('.card'));
    const dotsEl = document.getElementById('dots');
    const total = cards.length;
    let current = 0;

    const positions = [
      { x: -540, rotY:  42, scale: 0.72, opacity: 0.35, z: -200 },
      { x: -240, rotY:  28, scale: 0.85, opacity: 0.60, z: -100 },
      { x:    0, rotY:   0, scale: 1.00, opacity: 1.00, z:    0 },
      { x:  240, rotY: -28, scale: 0.85, opacity: 0.60, z: -100 },
      { x:  540, rotY: -42, scale: 0.72, opacity: 0.35, z: -200 },
    ];

    const dots = Array.from({ length: total }, (_, i) => {
      const d = document.createElement('div');
      d.className = 'dot' + (i === 0 ? ' active' : '');
      d.addEventListener('click', () => goTo(i));
      dotsEl.appendChild(d);
      return d;
    });

    function goTo(n) {
      current = ((n % total) + total) % total;
      cards.forEach((card, i) => {
        let slot = i - current;
        if (slot < -2) slot += total;
        if (slot >  2) slot -= total;
        const visible = slot >= -2 && slot <= 2;
        const pos = positions[slot + 2];
        card.style.transform  = `translateX(${pos.x}px) translateZ(${pos.z}px) rotateY(${pos.rotY}deg) scale(${pos.scale})`;
        card.style.opacity    = visible ? pos.opacity : 0;
        card.style.filter     = slot === 0 ? 'none' : 'brightness(0.6)';
        card.style.zIndex     = 10 - Math.abs(slot);
        card.style.pointerEvents = slot === 0 ? 'auto' : 'none';
      });
      dots.forEach((d, i) => d.classList.toggle('active', i === current));
    }

    document.getElementById('prev').addEventListener('click', () => goTo(current - 1));
    document.getElementById('next').addEventListener('click', () => goTo(current + 1));
    cards.forEach((card, i) => { card.addEventListener('click', () => { if (i !== current) goTo(i); }); });

    let startX = 0;
    document.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive: true });
    document.addEventListener('touchend',   e => {
      const dx = e.changedTouches[0].clientX - startX;
      if (Math.abs(dx) > 40) goTo(current + (dx < 0 ? 1 : -1));
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft')  goTo(current - 1);
      if (e.key === 'ArrowRight') goTo(current + 1);
    });

    goTo(0);
  </script>
</body>
</html>
