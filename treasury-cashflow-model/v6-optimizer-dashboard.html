<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Treasury Optimizer v6</title><style>body{font-family:Arial;margin:0;background:#f5f7fa;color:#1f2933}header{background:#17365d;color:#fff;padding:22px 30px}main{max-width:1320px;margin:22px auto;padding:0 22px 48px}section{background:#fff;border:1px solid #d9e2ec;border-radius:10px;margin-bottom:18px;padding:18px}h1,h2{margin-top:0}h2{color:#17365d;font-size:18px;border-bottom:1px solid #e5e7eb;padding-bottom:8px}.grid{display:grid;grid-template-columns:repeat(4,minmax(170px,1fr));gap:12px}label{font-size:13px;font-weight:700;display:block;margin-bottom:5px}input,select{width:100%;box-sizing:border-box;padding:7px;border:1px solid #bcccdc;border-radius:5px}table{width:100%;border-collapse:collapse;font-size:13px;margin-top:10px}th{background:#17365d;color:white;text-align:left;padding:8px;position:sticky;top:0}td{border:1px solid #d9e2ec;padding:6px}.actions{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}button{background:#17365d;color:white;border:0;border-radius:6px;padding:9px 13px;font-weight:700}.wrap{max-height:520px;overflow:auto;border:1px solid #d9e2ec;border-radius:8px;margin-top:10px}.tabs button{background:#627d98}.tabs button.active{background:#17365d}.tab{display:none}.tab.active{display:block}.metric{display:inline-block;background:#f0f4f8;border:1px solid #d9e2ec;border-radius:8px;padding:10px;margin:5px 8px 5px 0}.metric b{display:block;font-size:12px;color:#52606d}.low{background:#fde2e2}.mid{background:#fff3bf}.high{background:#d3f9d8}.bar{height:16px;background:#d9e2ec;border-radius:4px}.bar span{display:block;height:16px;background:#17365d;border-radius:4px}.note{font-size:13px;color:#52606d}</style></head><body><header><h1>Treasury Optimizer v6</h1><p>Optimize deposit allocation and swap percentage across Fed scenarios, with audit views.</p></header><main><section><h2>Inputs</h2><div class="grid"><div><label>Start</label><input id="start" type="date" value="2026-05-29"></div><div><label>End</label><input id="end" type="date" value="2027-12-31"></div><div><label>Initial SOFR %</label><input id="sofr" type="number" value="4.35"></div><div><label>Cash</label><input id="cash" type="number" value="400000000"></div><div><label>Swap Notional Base</label><input id="swapBase" type="number" value="500000000"></div><div><label>Swap Fixed %</label><input id="swapFixed" type="number" value="3.50"></div><div><label>Swap Spread %</label><input id="swapSpread" type="number" value="0"></div><div><label>Swap Direction</label><select id="swapDir"><option value="receiveFixed" selected>Receive Fixed / Pay SOFR</option><option value="payFixed">Pay Fixed / Receive SOFR</option></select></div><div><label>Allocation Step</label><select id="allocStep"><option value="25" selected>25%</option><option value="10">10%</option><option value="5">5%</option></select></div><div><label>Swap % Step</label><select id="swapStep"><option value="25" selected>25%</option><option value="10">10%</option><option value="5">5%</option></select></div><div><label>Objective</label><select id="objective"><option value="avg" selected>Max Average</option><option value="worst">Max Worst Case</option><option value="stable">Most Stable</option></select></div><div><label>Heat Map Scenario</label><select id="heatScenario"></select></div></div></section><section><h2>Fed Paths</h2><table id="fed"><thead><tr><th>Meeting</th><th><input class="sc" value="Base"></th><th><input class="sc" value="Fast Cuts"></th><th><input class="sc" value="Hikes"></th></tr></thead><tbody><tr><td><input type="date" value="2026-06-17"></td><td><input type="number" value="0"></td><td><input type="number" value="-25"></td><td><input type="number" value="25"></td></tr><tr><td><input type="date" value="2026-07-29"></td><td><input type="number" value="-25"></td><td><input type="number" value="-25"></td><td><input type="number" value="25"></td></tr><tr><td><input type="date" value="2026-09-16"></td><td><input type="number" value="0"></td><td><input type="number" value="-50"></td><td><input type="number" value="0"></td></tr></tbody></table></section><section><h2>Deposit Spreads</h2><div class="grid"><div><label>O/N</label><input id="spON" value="-0.10" type="number"></div><div><label>1M</label><input id="sp1M" value="0.05" type="number"></div><div><label>2M</label><input id="sp2M" value="0.12" type="number"></div><div><label>3M</label><input id="sp3M" value="0.20" type="number"></div></div><div class="actions"><button onclick="runSim()">Run Simulation</button></div></section><section><h2>Dashboard</h2><div id="metrics"></div><div class="tabs"><button class="active" onclick="tab('rank',this)">Ranking</button><button onclick="tab('heat',this)">Heat Map</button><button onclick="tab('frontier',this)">Frontier</button><button onclick="tab('tornado',this)">Tornado</button><button onclick="tab('audit',this)">Audit</button></div><div id="rank" class="tab active"><div id="rankOut" class="wrap"></div></div><div id="heat" class="tab"><p class="note">Rows = swap %, columns = 3M %, remaining allocation goes to O/N.</p><div id="heatOut" class="wrap"></div></div><div id="frontier" class="tab"><div id="frontierOut" class="wrap"></div></div><div id="tornado" class="tab"><div id="tornadoOut" class="wrap"></div></div><div id="audit" class="tab"><div id="auditOut" class="wrap"></div></div></section></main><script>let last=[],lastCurve=null;const fmt=n=>Math.round(n).toLocaleString('en-US'),rf=n=>n.toFixed(4)+'%';function d(v){return new Date(v+'T00:00:00')}function iso(x){return x.toISOString().slice(0,10)}function addDays(x,n){let y=new Date(x);y.setDate(y.getDate()+n);return y}function tab(id,b){document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active'));document.getElementById(id).classList.add('active');b.classList.add('active')}function scen(){let names=[...document.querySelectorAll('.sc')].map(x=>x.value),meet=[...document.querySelectorAll('#fed tbody tr')].map(r=>{let i=[...r.querySelectorAll('input')],m={};names.forEach((n,k)=>m[n]=+i[k+1].value||0);return{date:i[0].value,m}});return{names,meet}}function curve(){let s=scen(),cur={},rows=[],x=d(start.value),e=d(end.value);s.names.forEach(n=>cur[n]=+sofr.value||0);for(;x<=e;x=addDays(x,1)){let k=iso(x);s.meet.filter(m=>m.date==k).forEach(m=>s.names.forEach(n=>cur[n]+=m.m[n]/100));rows.push({date:k,bd:x.getDay()!=0&&x.getDay()!=6,rates:{...cur}})}return{names:s.names,rows}}function dep(rows,sc,a){let c=+cash.value,sp={ON:+spON.value,M1:+sp1M.value,M2:+sp2M.value,M3:+sp3M.value},tot=0;rows.filter(r=>r.bd).forEach(r=>{tot+=c*(a.ON/100)*((r.rates[sc]+sp.ON)/100)/360;tot+=c*(a.M1/100)*((r.rates[sc]+sp.M1)/100)/360;tot+=c*(a.M2/100)*((r.rates[sc]+sp.M2)/100)/360;tot+=c*(a.M3/100)*((r.rates[sc]+sp.M3)/100)/360});return tot}function swp(rows,sc,p){let n=(+swapBase.value)*p/100,f=+swapFixed.value,s=+swapSpread.value,dir=swapDir.value,tot=0;rows.filter(r=>r.bd).forEach(r=>{let fl=n*((r.rates[sc]+s)/100)/360,fx=n*(f/100)/360;tot+=dir=='receiveFixed'?fx-fl:fl-fx});return tot}function allocs(){let st=+allocStep.value,out=[];for(let on=0;on<=100;on+=st)for(let m1=0;m1<=100-on;m1+=st)for(let m2=0;m2<=100-on-m1;m2+=st)out.push({ON:on,M1:m1,M2:m2,M3:100-on-m1-m2});return out}function runSim(){let c=curve();heatScenario.innerHTML=c.names.map(n=>'<option>'+n+'</option>').join('');let rows=[];allocs().forEach(a=>{for(let p=0;p<=100;p+=+swapStep.value){let vals={},deps={},swps={};c.names.forEach(sc=>{deps[sc]=dep(c.rows,sc,a);swps[sc]=swp(c.rows,sc,p);vals[sc]=deps[sc]+swps[sc]});let ar=Object.values(vals),avg=ar.reduce((x,y)=>x+y,0)/ar.length,worst=Math.min(...ar),best=Math.max(...ar),range=best-worst;rows.push({a,p,vals,deps,swps,avg,worst,best,range})}});let o=objective.value;rows.sort((x,y)=>o=='avg'?y.avg-x.avg:o=='worst'?y.worst-x.worst:x.range-y.range);last=rows;lastCurve=c;render(rows,c)}function render(rows,c){let t=rows[0];metrics.innerHTML='<div class="metric"><b>Best</b>O/N '+t.a.ON+' | 1M '+t.a.M1+' | 2M '+t.a.M2+' | 3M '+t.a.M3+' | Swap '+t.p+'</div><div class="metric"><b>Avg</b>'+fmt(t.avg)+'</div><div class="metric"><b>Worst</b>'+fmt(t.worst)+'</div><div class="metric"><b>Range</b>'+fmt(t.range)+'</div>';rankOut.innerHTML=table(['Rank','O/N','1M','2M','3M','Swap',...c.names,'Average','Worst','Range','Audit'],rows.slice(0,100).map((r,i)=>[i+1,r.a.ON+'%',r.a.M1+'%',r.a.M2+'%',r.a.M3+'%',r.p+'%',...c.names.map(n=>fmt(r.vals[n])),fmt(r.avg),fmt(r.worst),fmt(r.range),'<button onclick="audit('+i+')">Audit</button>']));heat(rows,c.names);front(rows);tornado(t,c);audit(0)}function heat(rows,names){let sc=heatScenario.value||names[0],cols=[0,25,50,75,100],ps=[0,25,50,75,100],vals=[];ps.forEach(p=>cols.forEach(m3=>{let r=rows.find(x=>x.p==p&&x.a.M3==m3&&x.a.ON==100-m3&&x.a.M1==0&&x.a.M2==0);if(r)vals.push(r.vals[sc])}));let min=Math.min(...vals),max=Math.max(...vals);heatOut.innerHTML=table(['Swap / 3M',...cols.map(x=>x+'%')],ps.map(p=>[p+'%',...cols.map(m3=>{let r=rows.find(x=>x.p==p&&x.a.M3==m3&&x.a.ON==100-m3&&x.a.M1==0&&x.a.M2==0),v=r?r.vals[sc]:0,z=(v-min)/(max-min||1),cls=z>.66?'high':z>.33?'mid':'low';return '<span class="'+cls+'">'+(r?fmt(v):'-')+'</span>'})]))}function front(rows){let max=Math.max(...rows.map(r=>r.avg));frontierOut.innerHTML=table(['Strategy','Range','Average','Visual'],rows.slice(0,60).map(r=>['O/N '+r.a.ON+' 1M '+r.a.M1+' 2M '+r.a.M2+' 3M '+r.a.M3+' Swap '+r.p,fmt(r.range),fmt(r.avg),'<div class="bar"><span style="width:'+((r.avg/max)*100).toFixed(0)+'%"></span></div>']))}function tornado(top,c){let tests=[['All O/N',{ON:100,M1:0,M2:0,M3:0},top.p],['All 3M',{ON:0,M1:0,M2:0,M3:100},top.p],['No Swap',top.a,0],['100% Swap',top.a,100]],rows=tests.map(t=>{let vals=c.names.map(sc=>dep(c.rows,sc,t[1])+swp(c.rows,sc,t[2])),avg=vals.reduce((a,b)=>a+b,0)/vals.length;return{name:t[0],impact:avg-top.avg}}),max=Math.max(...rows.map(r=>Math.abs(r.impact)))||1;tornadoOut.innerHTML=table(['Test','Impact','Visual'],rows.map(r=>[r.name,fmt(r.impact),'<div class="bar"><span style="width:'+(Math.abs(r.impact)/max*100).toFixed(0)+'%"></span></div>']))}function audit(i){let r=last[i],c=lastCurve,sc=c.names[0];auditOut.innerHTML=table(['Date','BD',sc+' SOFR','Deposit Income','Swap Income'],c.rows.map(x=>[x.date,x.bd?'BD':'WE',rf(x.rates[sc]),fmt(x.bd?dep([x],sc,r.a):0),fmt(x.bd?swp([x],sc,r.p):0)]))}function table(h,rows){return '<table><thead><tr>'+h.map(x=>'<th>'+x+'</th>').join('')+'</tr></thead><tbody>'+rows.map(r=>'<tr>'+r.map(x=>'<td>'+x+'</td>').join('')+'</tr>').join('')+'</tbody></table>'}runSim();</script></body></html>
