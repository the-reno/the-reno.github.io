<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Daily Swap Cashflow by Fed Path</title><style>body{font-family:Arial;margin:24px;background:#f5f7fa;color:#1f2933}section{background:#fff;border:1px solid #d9e2ec;border-radius:10px;padding:18px;margin-bottom:18px}button{background:#17365d;color:white;border:0;border-radius:6px;padding:10px 14px;font-weight:600}table{width:100%;border-collapse:collapse;margin-top:12px}th{background:#17365d;color:#fff;text-align:left;padding:8px;position:sticky;top:0}td{border:1px solid #d9e2ec;padding:6px}input,select{width:100%;box-sizing:border-box;padding:6px}.wrap{max-height:520px;overflow:auto;border:1px solid #d9e2ec}.tabs button{background:#627d98}.tabs button.active{background:#17365d}.tab{display:none}.tab.active{display:block}</style></head><body><h1>Daily Swap Cashflow by Fed Path</h1><section><h2>Fed Scenarios</h2><table id="fed"><thead><tr><th>Date</th><th>Base</th><th>Fast Cuts</th></tr></thead><tbody><tr><td><input type="date" value="2026-06-17"></td><td><input type="number" value="0"></td><td><input type="number" value="-25"></td></tr><tr><td><input type="date" value="2026-07-29"></td><td><input type="number" value="-25"></td><td><input type="number" value="-25"></td></tr></tbody></table></section><section><h2>Inputs</h2><table><tbody><tr><td>Start</td><td><input id="start" type="date" value="2026-05-29"></td><td>End</td><td><input id="end" type="date" value="2027-12-31"></td><td>Initial SOFR %</td><td><input id="sofr" type="number" value="4.35"></td></tr></tbody></table></section><section><h2>Swap Strategies</h2><div class="tabs"><button type="button" class="active" onclick="tab('linked')">Linked IRS</button><button type="button" onclick="tab('custom')">Custom Swap</button><button type="button" onclick="tab('daily')">Daily Swap CF</button><button type="button" onclick="tab('summary')">Summary</button></div><div id="linked" class="tab active"><table id="linkedTable"><thead><tr><th>Strategy</th><th>Start</th><th>Maturity</th><th>Notional</th><th>Fixed %</th><th>Freq</th><th>Spread %</th><th>Direction</th></tr></thead><tbody><tr><td><input value="IRS Bond A 50%"></td><td><input type="date" value="2026-05-29"></td><td><input type="date" value="2027-05-29"></td><td><input type="number" value="250000000"></td><td><input type="number" value="3.50"></td><td><select><option value="2" selected>Semi</option><option value="4">Quarterly</option></select></td><td><input type="number" value="0"></td><td><select><option value="payFixed" selected>Pay Fixed</option><option value="receiveFixed">Receive Fixed</option></select></td></tr></tbody></table></div><div id="custom" class="tab"><table id="customTable"><thead><tr><th>Strategy</th><th>Start</th><th>Maturity</th><th>Notional</th><th>Fixed %</th><th>Freq</th><th>Spread %</th><th>Direction</th></tr></thead><tbody><tr><td><input value="Custom IRS 1"></td><td><input type="date" value="2026-05-29"></td><td><input type="date" value="2027-05-29"></td><td><input type="number" value="100000000"></td><td><input type="number" value="3.75"></td><td><select><option value="2" selected>Semi</option><option value="4">Quarterly</option></select></td><td><input type="number" value="0"></td><td><select><option value="payFixed" selected>Pay Fixed</option><option value="receiveFixed">Receive Fixed</option></select></td></tr></tbody></table></div><div id="daily" class="tab"><button type="button" onclick="run()">Run Daily Swap Cashflow</button><div id="dailyOut" class="wrap"></div></div><div id="summary" class="tab"><div id="summaryOut"></div></div></section><script>function tab(id){document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active'));document.getElementById(id).classList.add('active');event.target.classList.add('active')}function d(v){return new Date(v+'T00:00:00')}function iso(x){return x.toISOString().slice(0,10)}function addDays(x,n){let y=new Date(x);y.setDate(y.getDate()+n);return y}function addMonths(x,n){let y=new Date(x);let day=y.getDate();y.setMonth(y.getMonth()+n);if(y.getDate()!=day)y.setDate(0);return y}function fed(){let rows=[...document.querySelectorAll('#fed tbody tr')];let scenarios=['Base','Fast Cuts'];return{scenarios,meetings:rows.map(r=>{let c=r.querySelectorAll('input');return{date:c[0].value,moves:{'Base':Number(c[1].value||0),'Fast Cuts':Number(c[2].value||0)}}})}}function curve(){let start=d(document.getElementById('start').value),end=d(document.getElementById('end').value),init=Number(document.getElementById('sofr').value);let f=fed(),cur={};f.scenarios.forEach(s=>cur[s]=init);let rows=[];for(let x=start;x<=end;x=addDays(x,1)){let k=iso(x);f.meetings.filter(m=>m.date==k).forEach(m=>f.scenarios.forEach(s=>cur[s]+=m.moves[s]/100));rows.push({date:k,day:x.getDay()==0||x.getDay()==6?'WE':'BD',rates:{...cur}})}return{scenarios:f.scenarios,rows}}function swaps(){let out=[];['linkedTable','customTable'].forEach(id=>{document.querySelectorAll('#'+id+' tbody tr').forEach(r=>{let v=[...r.querySelectorAll('input,select')].map(x=>x.value);out.push({id:v[0],start:v[1],mat:v[2],notional:Number(v[3]),fixed:Number(v[4]),freq:Number(v[5]),spread:Number(v[6]),dir:v[7]})})});return out}function payDates(s){let out=[],x=addMonths(d(s.start),12/s.freq),m=d(s.mat);while(x<=m){out.push(iso(x));x=addMonths(x,12/s.freq)}return out}function run(){let c=curve(),sw=swaps(),rateMap=new Map(c.rows.map(r=>[r.date,r]));let cf={};c.rows.forEach(r=>c.scenarios.forEach(sc=>{let key=r.date+'|'+sc;cf[key]={date:r.date,day:r.day,scenario:sc,total:0};sw.forEach(s=>cf[key][s.id]=0)}));sw.forEach(s=>payDates(s).forEach(dt=>{let rr=rateMap.get(dt);if(!rr)return;c.scenarios.forEach(sc=>{let fixed=s.notional*(s.fixed/100)/s.freq;let floating=s.notional*((rr.rates[sc]+s.spread)/100)/s.freq;let net=s.dir=='payFixed'?floating-fixed:fixed-floating;let key=dt+'|'+sc;cf[key][s.id]=net;cf[key].total+=net})}));let rows=Object.values(cf);let h='<table><thead><tr><th>Date</th><th>Day</th><th>Scenario</th>';sw.forEach(s=>h+='<th>'+s.id+'</th>');h+='<th>Total Swap CF</th></tr></thead><tbody>';rows.forEach(r=>{h+='<tr><td>'+r.date+'</td><td>'+r.day+'</td><td>'+r.scenario+'</td>';sw.forEach(s=>h+='<td>'+fmt(r[s.id])+'</td>');h+='<td>'+fmt(r.total)+'</td></tr>'});h+='</tbody></table>';document.getElementById('dailyOut').innerHTML=h;let sum={};rows.forEach(r=>sum[r.scenario]=(sum[r.scenario]||0)+r.total);document.getElementById('summaryOut').innerHTML=Object.keys(sum).map(k=>'<p><b>'+k+':</b> '+fmt(sum[k])+'</p>').join('');tab('daily')}function fmt(x){return x?Math.round(x).toLocaleString('en-US'):'-'}</script></body></html>
